<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="InBody">
<meta name="theme-color" content="#111111">
<title>InBody トラッカー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg:#f4f3f0;--surface:#fff;--surface2:#f0ede8;--border:#e2ddd8;
  --text:#1a1814;--text2:#7a746e;--text3:#b0a89e;
  --accent:#2d6a4f;--accent3:#7f77dd;--good:#2d6a4f;--bad:#c0392b;
  --mono:'DM Mono',monospace;--sans:'Noto Sans JP',sans-serif;
  --radius:12px;--radius-sm:8px;--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--sans);color:var(--text)}
.app{display:flex;flex-direction:column;height:100%;height:100dvh}
.header{padding:14px 20px 12px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header-title{font-size:17px;font-weight:700;letter-spacing:-.02em}
.header-sub{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:1px}
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:16px 16px calc(16px + var(--safe-bottom))}
.nav{display:flex;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:var(--safe-bottom)}
.nav-btn{flex:1;border:none;background:transparent;padding:10px 4px 8px;font-size:10px;color:var(--text3);cursor:pointer;font-family:var(--sans);display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .15s}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:22px;height:22px}
.sec{display:none}.sec.active{display:block}
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:14px 16px;margin-bottom:12px}
.card-title{font-size:12px;font-weight:700;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}
.profile-bar{background:var(--text);color:#fff;border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.prof-item{text-align:center}
.prof-label{font-size:9px;opacity:.5;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px;font-family:var(--mono)}
.prof-val{font-size:17px;font-weight:700;font-family:var(--mono)}
.prof-unit{font-size:10px;opacity:.6}
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.metric-label{font-size:10px;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;font-family:var(--mono);margin-bottom:4px}
.metric-val{font-size:24px;font-weight:700;font-family:var(--mono);color:var(--text);letter-spacing:-.02em}
.metric-unit{font-size:11px;color:var(--text3)}
.metric-diff{font-size:11px;margin-top:3px;font-family:var(--mono)}
.metric-diff .good{color:var(--good)}.metric-diff .bad{color:var(--bad)}
.seg-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.seg-item{background:var(--surface2);border-radius:var(--radius-sm);padding:8px 6px;text-align:center}
.seg-label{font-size:9px;color:var(--text3);margin-bottom:3px}
.seg-val{font-size:15px;font-weight:700;font-family:var(--mono)}
.seg-diff{font-size:10px;font-family:var(--mono);margin-top:2px}
.comp-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.comp-row{background:var(--surface2);border-radius:var(--radius-sm);padding:8px 10px;display:flex;justify-content:space-between;align-items:center}
.comp-label{font-size:11px;color:var(--text2)}
.comp-val{font-size:13px;font-weight:700;font-family:var(--mono)}
.comp-unit{font-size:10px;color:var(--text3)}
.section-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin:18px 0 8px;padding-left:2px;font-family:var(--mono)}
.chart-wrap{position:relative;width:100%;height:180px}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3);font-family:var(--mono)}

/* Axis range control */
.axis-ctrl{display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap}
.axis-ctrl label{font-size:10px;color:var(--text3);font-family:var(--mono);white-space:nowrap;width:16px}
.axis-input{width:56px;padding:4px 6px;font-size:12px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-family:var(--mono);text-align:center}
.axis-btn{padding:4px 10px;font-size:11px;background:var(--text);color:#fff;border:none;border-radius:6px;cursor:pointer;font-family:var(--mono);white-space:nowrap}
.axis-sep{color:var(--text3);font-size:11px}

/* Map axis controls */
.map-ctrl{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.map-ctrl-group{background:var(--surface2);border-radius:var(--radius-sm);padding:8px 10px}
.map-ctrl-label{font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:5px;font-weight:700;letter-spacing:.05em}
.map-ctrl-row{display:flex;align-items:center;gap:4px}
.map-input{width:48px;padding:3px 5px;font-size:12px;border:1px solid var(--border);border-radius:5px;background:#fff;color:var(--text);font-family:var(--mono);text-align:center}
.map-btn{padding:4px 8px;font-size:11px;background:var(--text);color:#fff;border:none;border-radius:5px;cursor:pointer;font-family:var(--mono);margin-top:5px;width:100%}

.form-section{margin-bottom:12px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.form-field{margin-bottom:10px}
.form-label{font-size:11px;color:var(--text2);display:block;margin-bottom:4px;font-weight:500}
.form-input{width:100%;padding:9px 12px;font-size:15px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-family:var(--mono);appearance:none;-webkit-appearance:none}
.form-input:focus{outline:none;border-color:var(--accent)}
.btn-primary{width:100%;padding:14px;background:var(--text);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;font-family:var(--sans)}
.btn-img{width:100%;padding:16px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;font-family:var(--sans);margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px}
.img-drop{border:2px dashed var(--border);border-radius:var(--radius);padding:24px;text-align:center;color:var(--text3);font-size:13px;margin-bottom:10px;cursor:pointer}
.img-drop.has-img{border:2px solid var(--accent)}
.btn-parse{width:100%;padding:12px;background:var(--accent3);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--sans);margin-bottom:8px;display:none}
.parse-status{font-size:12px;color:var(--text2);min-height:18px;margin-bottom:10px;font-family:var(--mono)}
.hist-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;position:relative}
.hist-date{font-size:11px;font-family:var(--mono);color:var(--text3);margin-bottom:6px}
.hist-row{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.hist-cell{text-align:center}
.hist-cell-label{font-size:9px;color:var(--text3)}
.hist-cell-val{font-size:14px;font-weight:700;font-family:var(--mono)}
.btn-del{position:absolute;top:10px;right:12px;background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:2px 6px}
canvas{display:block}
.save-msg{font-size:12px;color:var(--accent);font-family:var(--mono);text-align:center;margin-top:8px;min-height:16px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div><div class="header-title">InBody</div><div class="header-sub">体組成トラッカー</div></div>
    <div style="font-size:22px">💪</div>
  </div>
  <div class="content" id="content">

    <!-- DASHBOARD -->
    <div id="sec-dashboard" class="sec active">
      <div id="db-profile" class="profile-bar"></div>
      <div class="metrics-grid" id="db-cards"></div>
      <div class="card"><div class="card-title">部位別筋肉量</div><div class="seg-grid" id="db-seg"></div></div>
      <div class="card"><div class="card-title">体組成</div><div class="comp-grid" id="db-comp"></div></div>
    </div>

    <!-- CHARTS -->
    <div id="sec-charts" class="sec"><div id="charts-root"></div></div>

    <!-- MAPS -->
    <div id="sec-maps" class="sec"><div id="maps-root"></div></div>

    <!-- ADD -->
    <div id="sec-add" class="sec">
      <div class="card">
        <div class="card-title">📷 画像から自動入力</div>
        <div style="background:var(--surface2);border-radius:var(--radius-sm);padding:11px 13px;font-size:12px;color:var(--text2);line-height:1.8;margin-bottom:12px">
          <div style="font-weight:700;margin-bottom:3px;color:var(--text)">手順</div>
          <div>① 下のボタンで <strong>プロンプトをコピー</strong></div>
          <div>② <a href="https://claude.ai" target="_blank" style="color:var(--accent);font-weight:700">claude.ai</a> を開き、測定票の画像を添付して貼り付けて送信</div>
          <div>③ ClaudeのJSON出力をコピーして下の枠に貼り付け → 自動入力</div>
        </div>

        <!-- Step 1: copy prompt -->
        <button class="btn-img" style="margin-bottom:10px" onclick="copyPrompt()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          ① プロンプトをコピーする
        </button>
        <div id="copy-msg" style="font-size:11px;color:var(--accent);font-family:var(--mono);min-height:14px;margin-bottom:10px;text-align:center"></div>

        <!-- Step 2: open claude -->
        <a href="https://claude.ai" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;background:#7c3aed;color:#fff;border-radius:var(--radius);font-size:14px;font-weight:700;text-decoration:none;margin-bottom:14px">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          ② claude.ai を開く
        </a>

        <!-- Step 3: paste JSON -->
        <div style="font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.05em;margin-bottom:5px">③ ClaudeのJSON出力をここに貼り付け</div>
        <textarea id="json-paste" rows="4" placeholder='{"date":"2026-05-15","weight":65.2,...}' style="width:100%;padding:10px;font-size:12px;font-family:var(--mono);border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);resize:vertical;line-height:1.5"></textarea>
        <button class="btn-primary" style="margin-top:8px;background:var(--accent)" onclick="fillFromJson()">フォームに自動入力する</button>
        <div id="json-msg" style="font-size:11px;font-family:var(--mono);min-height:14px;margin-top:6px;text-align:center"></div>
      </div>
      <div class="card">
        <div class="card-title">基本情報</div>
        <div class="form-grid">
          <div class="form-field"><label class="form-label">測定日</label><input type="date" id="f-date" class="form-input"></div>
          <div class="form-field"><label class="form-label">体重 (kg)</label><input type="number" id="f-weight" class="form-input" step="0.1"></div>
        </div>
        <div class="form-field"><label class="form-label">身長 (cm)</label><input type="number" id="f-height" class="form-input" step="0.1" value="169"></div>
      </div>
      <div class="card">
        <div class="card-title">体組成</div>
        <div class="form-grid">
          <div class="form-field"><label class="form-label">筋肉量 (kg)</label><input type="number" id="f-muscle" class="form-input" step="0.1"></div>
          <div class="form-field"><label class="form-label">体脂肪量 (kg)</label><input type="number" id="f-fat" class="form-input" step="0.1"></div>
          <div class="form-field"><label class="form-label">体脂肪率 (%)</label><input type="number" id="f-fatpct" class="form-input" step="0.1"></div>
          <div class="form-field"><label class="form-label">体水分量 (kg)</label><input type="number" id="f-water" class="form-input" step="0.1"></div>
          <div class="form-field"><label class="form-label">タンパク質 (kg)</label><input type="number" id="f-protein" class="form-input" step="0.01"></div>
          <div class="form-field"><label class="form-label">ミネラル (kg)</label><input type="number" id="f-mineral" class="form-input" step="0.01"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">評価指標</div>
        <div class="form-grid">
          <div class="form-field"><label class="form-label">BMI</label><input type="number" id="f-bmi" class="form-input" step="0.1"></div>
          <div class="form-field"><label class="form-label">内臓脂肪指数</label><input type="number" id="f-visceral" class="form-input" step="1"></div>
          <div class="form-field"><label class="form-label">腹囲 (cm)</label><input type="number" id="f-waist" class="form-input" step="0.1"></div>
          <div class="form-field"><label class="form-label">発達点数</label><input type="number" id="f-score" class="form-input" step="1"></div>
          <div class="form-field"><label class="form-label">基礎代謝量 (kcal)</label><input type="number" id="f-bmr" class="form-input" step="1"></div>
          <div class="form-field"><label class="form-label">適正体重 (kg)</label><input type="number" id="f-ideal" class="form-input" step="0.1"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">部位別筋肉量 (kg)</div>
        <div class="form-grid">
          <div class="form-field"><label class="form-label">右腕</label><input type="number" id="f-ra" class="form-input" step="0.01"></div>
          <div class="form-field"><label class="form-label">左腕</label><input type="number" id="f-la" class="form-input" step="0.01"></div>
          <div class="form-field"><label class="form-label">胴体</label><input type="number" id="f-trunk" class="form-input" step="0.1"></div>
          <div class="form-field"><label class="form-label">右脚</label><input type="number" id="f-rl" class="form-input" step="0.01"></div>
          <div class="form-field"><label class="form-label">左脚</label><input type="number" id="f-ll" class="form-input" step="0.01"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">筋肉発達程度 (%)</div>
        <div class="form-grid-3">
          <div class="form-field"><label class="form-label">胴体</label><input type="number" id="f-dtrunk" class="form-input" step="0.1"></div>
          <div class="form-field"><label class="form-label">上半身</label><input type="number" id="f-dupper" class="form-input" step="0.1"></div>
          <div class="form-field"><label class="form-label">下半身</label><input type="number" id="f-dlower" class="form-input" step="0.1"></div>
        </div>
      </div>
      <button class="btn-primary" onclick="saveEntry()">保存する</button>
      <div class="save-msg" id="save-msg"></div>
    </div>

    <!-- HISTORY -->
    <div id="sec-history" class="sec"><div id="hist-root"></div></div>
  </div>

  <nav class="nav">
    <button class="nav-btn active" id="nav-dashboard" onclick="sw('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      ホーム
    </button>
    <button class="nav-btn" id="nav-charts" onclick="sw('charts')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      グラフ
    </button>
    <button class="nav-btn" id="nav-maps" onclick="sw('maps')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      マップ
    </button>
    <button class="nav-btn" id="nav-add" onclick="sw('add')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      追加
    </button>
    <button class="nav-btn" id="nav-history" onclick="sw('history')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>
      履歴
    </button>
  </nav>
</div>

<script>
const KEY='inbody_records_v1';
const BIRTHDAY=new Date('1993-05-15');
const G70='#E59400',G80='#1D9E75',G90='#7F77DD';
let records=[];
let chartsBuilt=false;
let mapsDrawn=false;
// Chart instances keyed by canvas id
const chartInstances={};
// Chart default ranges: {yMin, yMax, xMinOffset, xMaxOffset} — x offsets relative to data range
const chartDefaults={
  'c-w':{yMin:61,yMax:68},'c-m':{yMin:29,yMax:34},'c-f':{yMin:7,yMax:14},
  'c-fp':{yMin:13,yMax:22},'c-sc':{yMin:65,yMax:95},'c-bmi':{yMin:17,yMax:27},
  'c-bmr':{yMin:1480,yMax:1630},'c-vis':{yMin:20,yMax:65},
  'c-arms':{yMin:2.5,yMax:3.9},'c-legs':{yMin:7.8,yMax:10.2},'c-trunk':{yMin:23,yMax:27.5},
  'c-wat':{yMin:33,yMax:45},'c-pro':{yMin:8.5,yMax:12.5},'c-min':{yMin:3.1,yMax:4.2}
};
// store xVals/xlabels for later use in axis range updates
let _xVals=[],_xlabels=[],_xMin=0,_xMax=0;
// Map axis state
const mapState={
  vis:{xMin:25,xMax:40,yMin:0,yMax:120},
  body:{xMin:5,xMax:25,yMin:15,yMax:28}
};

const SEED=[
  {date:'2026-04-06',height:169,weight:65.2,muscle:29.9,fat:12.0,fatpct:18.3,bmi:22.8,visceral:46,waist:78,score:77,bmr:1520,ideal:62.9,water:39.1,protein:10.6,mineral:3.53,ra:2.82,la:2.83,trunk:23.4,rl:8.39,ll:8.36,devTrunk:97.1,devUpper:99.9,devLower:99.6},
  {date:'2026-04-12',height:169,weight:65.2,muscle:29.9,fat:12.0,fatpct:18.4,bmi:22.8,visceral:48,waist:79,score:77,bmr:1520,ideal:62.9,water:39.1,protein:10.6,mineral:3.54,ra:2.88,la:2.91,trunk:23.7,rl:8.20,ll:8.26,devTrunk:98.5,devUpper:97.6,devLower:98.4},

function calcAge(d){return(new Date(d).getTime()-BIRTHDAY.getTime())/(365.25*24*3600*1000);}
function fmt(v,d=1){return v!=null&&v!==''?parseFloat(v).toFixed(d):'—';}
function lerp(a,b,t){return a+(b-a)*t;}
function ptColor(t){const v=Math.round(lerp(0xd0,0x11,t));return `rgb(${v},${v},${v})`;}

function loadStorage(){try{const s=localStorage.getItem(KEY);if(s)return JSON.parse(s);}catch(e){}return null;}
function saveStorage(){try{localStorage.setItem(KEY,JSON.stringify(records));}catch(e){}}

function init(){
  const stored=loadStorage();
  if(stored&&stored.length>0){
    records=stored;
    const dates=new Set(records.map(r=>r.date));
    SEED.forEach(s=>{if(!dates.has(s.date))records.push(s);});
  } else {
    records=[...SEED];
  }
  records.sort((a,b)=>a.date.localeCompare(b.date));
  saveStorage();
  renderAll();
  document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
}

function renderAll(){renderDashboard();renderHistory();}

function sw(t){
  ['dashboard','charts','maps','add','history'].forEach(id=>{
    document.getElementById('sec-'+id).classList.toggle('active',id===t);
    document.getElementById('nav-'+id).classList.toggle('active',id===t);
  });
  document.getElementById('content').scrollTop=0;
  if(t==='charts')renderCharts();
  if(t==='maps')renderMaps();
}

function renderDashboard(){
  if(!records.length)return;
  const r=records[records.length-1];
  const p=records.length>1?records[records.length-2]:null;
  const ageYears=Math.floor(calcAge(r.date));
  document.getElementById('db-profile').innerHTML=`
    <div class="prof-item"><div class="prof-label">年齢</div><div class="prof-val">${ageYears}<span class="prof-unit">歳</span></div></div>
    <div class="prof-item"><div class="prof-label">身長</div><div class="prof-val">${r.height||169}<span class="prof-unit">cm</span></div></div>
    <div class="prof-item"><div class="prof-label">性別</div><div class="prof-val" style="font-size:14px;font-family:var(--sans)">男性</div></div>
    <div class="prof-item"><div class="prof-label">測定日</div><div class="prof-val" style="font-size:12px">${r.date.slice(5).replace('-','/')}</div></div>`;

  function diff(cur,prv,lower=false){
    if(cur==null||prv==null)return '<span style="color:var(--text3)">—</span>';
    const d=parseFloat(cur)-parseFloat(prv);
    if(Math.abs(d)<0.01)return '<span style="color:var(--text3)">→</span>';
    const g=lower?d<0:d>0;
    return `<span class="${g?'good':'bad'}">${d>0?'▲':'▼'} ${Math.abs(d).toFixed(1)}</span>`;
  }

  document.getElementById('db-cards').innerHTML=[
    ['体重','weight','kg',true],['筋肉量','muscle','kg',false],
    ['体脂肪量','fat','kg',true],['体脂肪率','fatpct','%',true],
    ['BMI','bmi','',true],['発達点数','score','点',false],
  ].map(([l,k,u,lo])=>`<div class="metric-card">
    <div class="metric-label">${l}</div>
    <div><span class="metric-val">${fmt(r[k],k==='score'?0:1)}</span><span class="metric-unit"> ${u}</span></div>
    <div class="metric-diff">${p?diff(r[k],p[k],lo):'—'}</div>
  </div>`).join('');

  document.getElementById('db-seg').innerHTML=[['右腕','ra',2],['左腕','la',2],['胴体','trunk',1],['右脚','rl',2],['左脚','ll',2]].map(([l,k,d])=>{
    const v=r[k],pv=p?.[k];
    let dh='<span style="color:var(--text3)">—</span>';
    if(v!=null&&pv!=null){const df=parseFloat(v)-parseFloat(pv);if(Math.abs(df)<0.01)dh='<span style="color:var(--text3)">→</span>';else dh=`<span class="${df>0?'good':'bad'}">${df>0?'▲':'▼'}${Math.abs(df).toFixed(2)}</span>`;}
    return `<div class="seg-item"><div class="seg-label">${l}</div><div class="seg-val">${fmt(v,d)}</div><div class="seg-diff">${dh}</div></div>`;
  }).join('');

  document.getElementById('db-comp').innerHTML=[
    ['体水分量',fmt(r.water),'kg'],['タンパク質',fmt(r.protein),'kg'],
    ['ミネラル',fmt(r.mineral,2),'kg'],['基礎代謝',r.bmr||'—','kcal'],
    ['内臓脂肪',r.visceral||'—',''],['腹囲',r.waist||'—','cm'],
    ['適正体重',fmt(r.ideal),'kg'],['発達点数',r.score||'—','点'],
  ].map(([l,v,u])=>`<div class="comp-row"><span class="comp-label">${l}</span><span class="comp-val">${v}<span class="comp-unit"> ${u}</span></span></div>`).join('');
}

function renderHistory(){

function del(date){
  if(!confirm(date+' を削除しますか？'))return;
  records=records.filter(r=>r.date!==date);
  saveStorage();renderAll();mapsDrawn=false;chartsBuilt=false;
}

function copyPrompt(){
  const prompt=`InBodyの体組成測定結果シートの画像からデータを読み取り、以下のJSON形式のみで返してください。値が読み取れない場合はnullにしてください。前置き・説明文は不要です。JSONのみ返してください。

{"date":"YYYY-MM-DD","height":null,"weight":null,"muscle":null,"fat":null,"fatpct":null,"bmi":null,"visceral":null,"waist":null,"score":null,"bmr":null,"ideal":null,"water":null,"protein":null,"mineral":null,"ra":null,"la":null,"trunk":null,"rl":null,"ll":null,"devTrunk":null,"devUpper":null,"devLower":null}`;
  navigator.clipboard.writeText(prompt).then(()=>{
    const m=document.getElementById('copy-msg');
    m.textContent='✅ コピーしました！claude.aiに貼り付けてください';
    setTimeout(()=>m.textContent='',4000);
  }).catch(()=>{
    // fallback for older browsers
    const ta=document.createElement('textarea');
    ta.value=prompt;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');
    document.body.removeChild(ta);
    const m=document.getElementById('copy-msg');
    m.textContent='✅ コピーしました！claude.aiに貼り付けてください';
    setTimeout(()=>m.textContent='',4000);
  });
}

function fillFromJson(){
  const raw=document.getElementById('json-paste').value.trim();
  const msg=document.getElementById('json-msg');
  if(!raw){msg.textContent='❌ JSONを貼り付けてください';msg.style.color='var(--bad)';return;}
  let parsed;
  try{
    const m=raw.match(/\{[\s\S]*\}/);
    if(!m)throw new Error('JSONが見つかりません');
    parsed=JSON.parse(m[0]);
  }catch(e){
    msg.textContent='❌ 読み取り失敗：正しいJSONを貼り付けてください';msg.style.color='var(--bad)';return;
  }
  const fields={date:'f-date',height:'f-height',weight:'f-weight',muscle:'f-muscle',fat:'f-fat',
    fatpct:'f-fatpct',bmi:'f-bmi',visceral:'f-visceral',waist:'f-waist',score:'f-score',
    bmr:'f-bmr',ideal:'f-ideal',water:'f-water',protein:'f-protein',mineral:'f-mineral',
    ra:'f-ra',la:'f-la',trunk:'f-trunk',rl:'f-rl',ll:'f-ll',
    devTrunk:'f-dtrunk',devUpper:'f-dupper',devLower:'f-dlower'};
  let filled=0;
  Object.entries(fields).forEach(([k,id])=>{
    const el=document.getElementById(id);
    if(el&&parsed[k]!=null){el.value=parsed[k];filled++;}
  });
  document.getElementById('json-paste').value='';
  msg.textContent=`✅ ${filled}項目を自動入力しました。内容を確認して「保存する」を押してください。`;
  msg.style.color='var(--accent)';
  // scroll down to the form
  document.getElementById('content').scrollTop+=200;
}

function saveEntry(){
  const v=id=>{const x=parseFloat(document.getElementById(id).value);return isNaN(x)?null:x;};
  const date=document.getElementById('f-date').value;
  if(!date){alert('測定日を入力してください');return;}
  const e={date,height:v('f-height'),weight:v('f-weight'),muscle:v('f-muscle'),fat:v('f-fat'),fatpct:v('f-fatpct'),bmi:v('f-bmi'),visceral:v('f-visceral'),waist:v('f-waist'),score:v('f-score'),bmr:v('f-bmr'),ideal:v('f-ideal'),water:v('f-water'),protein:v('f-protein'),mineral:v('f-mineral'),ra:v('f-ra'),la:v('f-la'),trunk:v('f-trunk'),rl:v('f-rl'),ll:v('f-ll'),devTrunk:v('f-dtrunk'),devUpper:v('f-dupper'),devLower:v('f-dlower')};
  const idx=records.findIndex(r=>r.date===date);
  if(idx>=0)records[idx]=e;else records.push(e);

}

function renderCharts(){
  if(chartsBuilt)return;chartsBuilt=true;
  const root=document.getElementById('charts-root');root.innerHTML='';
  const BASE=new Date(records[0].date).getTime(),MSD=86400000;
  const xVals=records.map(r=>(new Date(r.date).getTime()-BASE)/MSD);
  const xlabels=records.map(r=>r.date.slice(5).replace('-','/'));
  const N=records.length;
  const get=k=>records.map(r=>r[k]!=null?parseFloat(parseFloat(r[k]).toFixed(2)):null);
  // store globally for axis updates
  _xVals=xVals;_xlabels=xlabels;
  _xMin=xVals[0]-1;_xMax=xVals[N-1]+1;

  function xO(xMin,xMax){return{type:'linear',min:xMin,max:xMax,ticks:{font:{size:10},callback:v=>{const i=_xVals.indexOf(v);return i>=0?_xlabels[i]:null;},stepSize:1,autoSkip:false,maxRotation:0},grid:{color:'rgba(0,0,0,0.05)'}};}

  function mkChart(id,dss,refs,yMin,yMax){
    const allDs=[
      ...dss.map(d=>({label:d.label,data:xVals.map((x,i)=>({x,y:d.raw[i]})),borderColor:d.color,backgroundColor:'transparent',borderWidth:2,borderDash:d.dash||[],pointRadius:4,pointBackgroundColor:d.color,tension:0.3})),
      ...refs.map(d=>({label:d.label,data:xVals.map(x=>({x,y:d.val})),borderColor:d.color,backgroundColor:'transparent',borderWidth:1,borderDash:[5,4],pointRadius:0,pointHoverRadius:0,tension:0}))
    ];
    const c=new Chart(document.getElementById(id),{type:'line',data:{datasets:allDs},options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,callbacks:{
        title:is=>{const x=is[0].parsed.x;const i=_xVals.indexOf(x);return i>=0?records[i].date:'';},
        label:ctx=>ctx.dataset.pointRadius===0?null:`${ctx.dataset.label}: ${ctx.parsed.y}`
      }}},
      scales:{x:xO(_xMin,_xMax),y:{ticks:{font:{size:10}},min:yMin,max:yMax,grid:{color:'rgba(0,0,0,0.05)'}}}
    }});
    chartInstances[id]=c;
  }

  const BASE_MS=new Date(records[0].date).getTime();
  function dateToOffset(dateStr){return(new Date(dateStr).getTime()-BASE_MS)/86400000;}
  const defaultXMinDate=records[0].date;
  const defaultXMaxDate=records[records.length-1].date;

  function axisCtrl(id,def){
    return `<div class="map-ctrl" style="margin-bottom:8px">

          <button class="map-btn" style="margin-top:0;font-size:10px;padding:5px 4px;white-space:nowrap" id="apply-x-${id}">適用</button>
          <button class="map-btn" style="margin-top:0;font-size:10px;padding:5px 4px;white-space:nowrap;background:var(--text3)" id="reset-x-${id}">リセット</button>
        </div>

      <div class="map-ctrl-group">
        <div class="map-ctrl-label">Y軸（値）</div>
        <div class="map-ctrl-row">

        </div>
      </div>
    </div>`;
  }

  function leg(c,l,d=false){return `<div class="legend-item"><span style="display:inline-block;width:16px;height:${d?'2px':'3px'};${d?'border-top:2px dashed '+c:'background:'+c}"></span>${l}</div>`;}

  function card(title,legH,cid){
    const def=chartDefaults[cid];

  mkChart('c-trunk',[ds('胴体','trunk','#7F77DD')],[rf('70',24.5,G70),rf('80',25.5,G80),rf('90',26.5,G90)],23,27.5);
  sl('体組成成分');
  card('体水分量 (kg)',leg('#185FA5','体水分量')+leg('#aaa','標準',true),'c-wat');
  mkChart('c-wat',[ds('体水分量','water','#185FA5')],[rf('下',35.4,'#aaa'),rf('上',43.2,'#aaa')],33,45);
  card('タンパク質 (kg)',leg('#1D9E75','タンパク質')+leg('#aaa','標準',true),'c-pro');
  mkChart('c-pro',[ds('タンパク質','protein','#1D9E75')],[rf('下',9.4,'#aaa'),rf('上',11.6,'#aaa')],8.5,12.5);
  card('ミネラル (kg)',leg('#BA7517','ミネラル')+leg('#aaa','標準',true),'c-min');
  mkChart('c-min',[ds('ミネラル','mineral','#BA7517')],[rf('下',3.27,'#aaa'),rf('上',3.99,'#aaa')],3.1,4.2);
}

/* ===== MAPS ===== */
function drawStar(ctx,cx,cy,r,fill){
  ctx.beginPath();
  for(let i=0;i<10;i++){const ang=(i*Math.PI/5)-Math.PI/2,rad=i%2===0?r:r*0.42;i===0?ctx.moveTo(cx+Math.cos(ang)*rad,cy+Math.sin(ang)*rad):ctx.lineTo(cx+Math.cos(ang)*rad,cy+Math.sin(ang)*rad);}
  ctx.closePath();ctx.fillStyle=fill;ctx.fill();ctx.strokeStyle='#000';ctx.lineWidth=1.5;ctx.stroke();
}
function drawDot(ctx,x,y,t){
  ctx.beginPath();ctx.arc(x,y,8,0,Math.PI*2);
  ctx.fillStyle=ptColor(t);ctx.fill();
  ctx.strokeStyle=t<0.5?'rgba(60,60,60,0.8)':'rgba(220,220,220,0.9)';ctx.lineWidth=1.5;ctx.stroke();
}
function drawConn(ctx,pts,N){
  for(let i=0;i<N-1;i++){
    const t0=i/(N-1),t1=(i+1)/(N-1),{x:x0,y:y0}=pts[i],{x:x1,y:y1}=pts[i+1];
    const g=ctx.createLinearGradient(x0,y0,x1,y1);g.addColorStop(0,ptColor(t0));g.addColorStop(1,ptColor(t1));
    ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.strokeStyle=g;ctx.lineWidth=1.8;ctx.stroke();
    const mx=x0*0.38+x1*0.62,my=y0*0.38+y1*0.62,dx=x1-x0,dy=y1-y0,len=Math.sqrt(dx*dx+dy*dy);
    if(len>6){const ux=dx/len,uy=dy/len,r=5,tc=(t0+t1)/2,cv=Math.round(lerp(0xd0,0x11,tc));
      ctx.beginPath();ctx.moveTo(mx+ux*r,my+uy*r);ctx.lineTo(mx-ux*r-uy*r*0.6,my-uy*r+ux*r*0.6);ctx.lineTo(mx-ux*r+uy*r*0.6,my-uy*r-ux*r*0.6);
      ctx.closePath();ctx.fillStyle=`rgba(${cv},${cv},${cv},0.75)`;ctx.fill();}
  }
}

  root.innerHTML=`
    <div class="card">

      ${legH}
      <div class="map-ctrl">
        <div class="map-ctrl-group">
          <div class="map-ctrl-label">X軸（年齢）</div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:5px">

            <button class="map-btn" style="margin-top:0;background:var(--text3)" onclick="resetVisMap()">リセット</button>
          </div>
        </div>
        <div class="map-ctrl-group">
          <div class="map-ctrl-label">Y軸（指数）</div>
          <div class="map-ctrl-row"><input class="map-input" id="vis-ymin" type="number" value="${mapState.vis.yMin}"><span style="font-size:11px;color:var(--text3)">〜</span><input class="map-input" id="vis-ymax" type="number" value="${mapState.vis.yMax}"></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:5px">
            <button class="map-btn" style="margin-top:0" onclick="applyVisMap()">適用</button>
            <button class="map-btn" style="margin-top:0;background:var(--text3)" onclick="resetVisMap()">リセット</button>
          </div>
        </div>
      </div>
      <canvas id="cv" width="600" height="340" style="width:100%;height:auto"></canvas>
    </div>
    <div class="card">
      <div class="card-title">体型マップ</div>
      ${legH}
      <div class="map-ctrl">
        <div class="map-ctrl-group">
          <div class="map-ctrl-label">X軸（体脂肪率%）</div>
          <div class="map-ctrl-row"><input class="map-input" id="body-xmin" type="number" value="${mapState.body.xMin}"><span style="font-size:11px;color:var(--text3)">〜</span><input class="map-input" id="body-xmax" type="number" value="${mapState.body.xMax}"></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:5px">
            <button class="map-btn" style="margin-top:0" onclick="applyBodyMap()">適用</button>
            <button class="map-btn" style="margin-top:0;background:var(--text3)" onclick="resetBodyMap()">リセット</button>
          </div>
        </div>
        <div class="map-ctrl-group">
          <div class="map-ctrl-label">Y軸（BMI）</div>
          <div class="map-ctrl-row"><input class="map-input" id="body-ymin" type="number" value="${mapState.body.yMin}"><span style="font-size:11px;color:var(--text3)">〜</span><input class="map-input" id="body-ymax" type="number" value="${mapState.body.yMax}"></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:5px">
            <button class="map-btn" style="margin-top:0" onclick="applyBodyMap()">適用</button>

function applyVisMap(){
  const xMin=parseFloat(document.getElementById('vis-xmin').value);
  const xMax=parseFloat(document.getElementById('vis-xmax').value);
  const yMin=parseFloat(document.getElementById('vis-ymin').value);
  const yMax=parseFloat(document.getElementById('vis-ymax').value);
  if(isNaN(xMin)||isNaN(xMax)||isNaN(yMin)||isNaN(yMax)||xMin>=xMax||yMin>=yMax){alert('正しい範囲を入力してください');return;}
  mapState.vis={xMin,xMax,yMin,yMax};
  drawVisMap();
}

function resetVisMap(){
  mapState.vis={xMin:25,xMax:40,yMin:0,yMax:120};
  document.getElementById('vis-xmin').value=mapState.vis.xMin;
  document.getElementById('vis-xmax').value=mapState.vis.xMax;
  document.getElementById('vis-ymin').value=mapState.vis.yMin;
  document.getElementById('vis-ymax').value=mapState.vis.yMax;
  drawVisMap();
}

function applyBodyMap(){
  const xMin=parseFloat(document.getElementById('body-xmin').value);
  const xMax=parseFloat(document.getElementById('body-xmax').value);
  const yMin=parseFloat(document.getElementById('body-ymin').value);
  const yMax=parseFloat(document.getElementById('body-ymax').value);
  if(isNaN(xMin)||isNaN(xMax)||isNaN(yMin)||isNaN(yMax)||xMin>=xMax||yMin>=yMax){alert('正しい範囲を入力してください');return;}
  mapState.body={xMin,xMax,yMin,yMax};
  drawBodyMap();
}

function resetBodyMap(){
  mapState.body={xMin:5,xMax:25,yMin:15,yMax:28};
  document.getElementById('body-xmin').value=mapState.body.xMin;
  document.getElementById('body-xmax').value=mapState.body.xMax;
  document.getElementById('body-ymin').value=mapState.body.yMin;
  document.getElementById('body-ymax').value=mapState.body.yMax;
  drawBodyMap();
}

function drawVisMap(){
  const cv=document.getElementById('cv');
  if(!cv)return;
  const W=cv.width,H=cv.height,ctx=cv.getContext('2d');
  const PAD={l:46,r:18,t:18,b:40},PW=W-PAD.l-PAD.r,PH=H-PAD.t-PAD.b;
  const {xMin:XMIN,xMax:XMAX,yMin:YMIN,yMax:YMAX}=mapState.vis;
  const px=x=>PAD.l+(x-XMIN)/(XMAX-XMIN)*PW;
  const py=y=>PAD.t+(1-(y-YMIN)/(YMAX-YMIN))*PH;
  const FS=11; // uniform font size

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);

  // distribution band
  const allDist=[{age:20,lo:5,hi:60},{age:25,lo:5,hi:70},{age:27,lo:6,hi:75},{age:30,lo:8,hi:85},{age:32,lo:8,hi:87},{age:35,lo:10,hi:100},{age:37,lo:11,hi:105},{age:40,lo:12,hi:115},{age:45,lo:15,hi:125},{age:50,lo:18,hi:138},{age:55,lo:20,hi:148},{age:60,lo:22,hi:158},{age:65,lo:22,hi:165},{age:70,lo:20,hi:168}];
  const dist=allDist.filter(d=>d.age>=XMIN-5&&d.age<=XMAX+5);
  if(dist.length>=2){
    [[1.00,0.18],[0.70,0.14],[0.40,0.10]].forEach(([pct,al])=>{
      ctx.beginPath();
      let started=false;
      dist.forEach(d=>{
        const xc=Math.max(XMIN,Math.min(XMAX,d.age));
        const yv=Math.max(YMIN,Math.min(YMAX,d.lo+(d.hi-d.lo)*pct));
        if(!started){ctx.moveTo(px(xc),py(yv));started=true;}else ctx.lineTo(px(xc),py(yv));
      });
      [...dist].reverse().forEach(d=>{
        const xc=Math.max(XMIN,Math.min(XMAX,d.age));
        const yv=Math.max(YMIN,Math.min(YMAX,d.lo));
        ctx.lineTo(px(xc),py(yv));
      });
      ctx.closePath();ctx.fillStyle=`rgba(90,150,100,${al})`;ctx.fill();
    });
  }

  // grid
  ctx.strokeStyle='rgba(0,0,0,0.06)';ctx.lineWidth=0.5;
  const yStep=YMAX<=60?10:YMAX<=120?20:50;
  for(let y=Math.ceil(YMIN/yStep)*yStep;y<=YMAX;y+=yStep){ctx.beginPath();ctx.moveTo(PAD.l,py(y));ctx.lineTo(PAD.l+PW,py(y));ctx.stroke();}
  const xStep=XMAX-XMIN<=20?2:5;
  for(let x=Math.ceil(XMIN/xStep)*xStep;x<=XMAX;x+=xStep){ctx.beginPath();ctx.moveTo(px(x),PAD.t);ctx.lineTo(px(x),PAD.t+PH);ctx.stroke();}

  // danger line
  if(100>=YMIN&&100<=YMAX){
    ctx.setLineDash([5,4]);ctx.strokeStyle='#D85A30';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(PAD.l,py(100));ctx.lineTo(PAD.l+PW,py(100));ctx.stroke();ctx.setLineDash([]);
    ctx.font=`${FS}px monospace`;ctx.fillStyle='#D85A30';ctx.textAlign='right';ctx.textBaseline='bottom';
    ctx.fillText('要注意(100)',PAD.l+PW-2,py(100)-2);
  }

  // frame
  ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=1;ctx.strokeRect(PAD.l,PAD.t,PW,PH);

  // axis labels
  ctx.font=`${FS}px monospace`;ctx.fillStyle='#666';
  ctx.textAlign='center';ctx.textBaseline='top';
  for(let x=Math.ceil(XMIN/xStep)*xStep;x<=XMAX;x+=xStep)ctx.fillText(x+'歳',px(x),PAD.t+PH+4);
  ctx.textAlign='right';ctx.textBaseline='middle';
  for(let y=Math.ceil(YMIN/yStep)*yStep;y<=YMAX;y+=yStep)ctx.fillText(y,PAD.l-3,py(y));

  // axis titles
  ctx.textBaseline='alphabetic';ctx.textAlign='center';
  ctx.fillText('年齢（歳）',PAD.l+PW/2,H-3);
  ctx.save();ctx.translate(13,PAD.t+PH/2);ctx.rotate(-Math.PI/2);ctx.fillText('内臓脂肪指数',0,0);ctx.restore();

  // plots
  const N=records.length;
  const pts=records.filter(r=>r.visceral!=null).map(r=>({x:px(Math.max(XMIN,Math.min(XMAX,calcAge(r.date)))),y:py(Math.max(YMIN,Math.min(YMAX,r.visceral)))}));
  const Np=pts.length;
  if(Np>0){
    drawConn(ctx,pts,Np);
    for(let i=0;i<Np-1;i++)drawDot(ctx,pts[i].x,pts[i].y,i/(Np-1));
    drawStar(ctx,pts[Np-1].x,pts[Np-1].y,11,'#FFD700');
  }
}

function drawBodyMap(){
  const cb=document.getElementById('cb');
  if(!cb)return;
  const W=cb.width,H=cb.height,ctx=cb.getContext('2d');
  const PAD={l:46,r:66,t:26,b:40},PW=W-PAD.l-PAD.r,PH=H-PAD.t-PAD.b;
  const {xMin:XMIN,xMax:XMAX,yMin:YMIN,yMax:YMAX}=mapState.body;
  const px=x=>PAD.l+(x-XMIN)/(XMAX-XMIN)*PW;
  const py=y=>PAD.t+(1-(y-YMIN)/(YMAX-YMIN))*PH;
  const cX=x=>Math.max(XMIN,Math.min(XMAX,x));
  const cY=y=>Math.max(YMIN,Math.min(YMAX,y));
  const FS=11; // uniform font size — same as zone labels

  ctx.clearRect(0,0,W,H);ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);

  const BH=25,BM=21.75,BL=18.5,al=0.40,BC='rgba(80,78,72,0.55)',OB=[228,185,152],OL=[88,45,5];
  const zones=[
    {x1:0,x2:15,y1:BH,y2:35,bg:[85,168,135],lc:[4,68,48],label:'アスリート'},
    {x1:15,x2:20,y1:BH,y2:35,bg:OB,lc:OL,label:'やや肥満'},
    {x1:20,x2:30,y1:BH,y2:35,bg:[215,155,130],lc:[100,40,5],label:'肥満'},
    {x1:5,x2:15,y1:BM,y2:BH,bg:[112,190,160],lc:[4,68,48],label:'筋肉型'},
    {x1:15,x2:20,y1:BL,y2:BH,bg:[165,220,188],lc:[4,68,48],label:'適正'},
    {x1:20,x2:30,y1:BM,y2:BH,bg:OB,lc:OL,label:'やや肥満'},
    {x1:0,x2:10,y1:BL,y2:BM,bg:[138,202,174],lc:[4,68,48],label:'筋肉型\nスリム'},
    {x1:10,x2:15,y1:BL,y2:BM,bg:[168,218,192],lc:[4,68,48],label:'スリム'},
    {x1:20,x2:25,y1:10,y2:BM,bg:[238,200,170],lc:[88,45,5],label:'隠れ肥満'},
    {x1:0,x2:10,y1:10,y2:BL,bg:[220,238,222],lc:[28,90,10],label:'痩せ'},
    {x1:10,x2:20,y1:10,y2:BL,bg:[205,228,208],lc:[28,90,10],label:'やや痩せ'},
  ];

  // fill zones
  zones.forEach(z=>{
    const x1c=cX(z.x1),x2c=cX(z.x2),y1c=cY(z.y1),y2c=cY(z.y2);
    if(x1c>=x2c||y1c>=y2c)return;
    ctx.fillStyle=`rgba(${z.bg[0]},${z.bg[1]},${z.bg[2]},${al})`;
    ctx.fillRect(px(x1c),py(y2c),px(x2c)-px(x1c),py(y1c)-py(y2c));
  });
  // stroke zones
  ctx.strokeStyle=BC;ctx.lineWidth=1;ctx.setLineDash([]);
  zones.forEach(z=>{
    const x1c=cX(z.x1),x2c=cX(z.x2),y1c=cY(z.y1),y2c=cY(z.y2);
    if(x1c>=x2c||y1c>=y2c)return;
    ctx.strokeRect(px(x1c),py(y2c),px(x2c)-px(x1c),py(y1c)-py(y2c));
  });
  // frame
  ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=1;ctx.strokeRect(PAD.l,PAD.t,PW,PH);

  // zone labels — bold FS px, same as all other text
  zones.forEach(z=>{
    const x1c=cX(z.x1),x2c=cX(z.x2),y1c=cY(z.y1),y2c=cY(z.y2);
    if(x1c>=x2c||y1c>=y2c)return;
    const cx2=(px(x1c)+px(x2c))/2,cy2=(py(y1c)+py(y2c))/2;
    const lines=z.label.split('\n');
    ctx.font=`bold ${FS}px sans-serif`;
    ctx.fillStyle=`rgba(${z.lc[0]},${z.lc[1]},${z.lc[2]},0.95)`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    lines.forEach((ln,li)=>ctx.fillText(ln,cx2,cy2+(li-(lines.length-1)/2)*(FS+2)));
  });

  // axis labels — same FS
  ctx.font=`${FS}px monospace`;ctx.fillStyle='#666';
  const xStep=XMAX-XMIN<=15?2:5;
  const yStep=YMAX-YMIN<=8?0.5:1;
  ctx.textAlign='center';ctx.textBaseline='top';
  for(let x=Math.ceil(XMIN/xStep)*xStep;x<=XMAX;x+=xStep)ctx.fillText(x+'%',px(x),PAD.t+PH+4);
  ctx.textAlign='right';ctx.textBaseline='middle';
  for(let y=Math.ceil(YMIN*(1/yStep))/(1/yStep);y<=YMAX+0.001;y+=yStep){
    const yy=Math.round(y*100)/100;
    if(yy<YMIN||yy>YMAX)continue;
    ctx.fillText(yy%1===0?String(yy):yy.toFixed(2===yStep?0:1),PAD.l-3,py(yy));
  }

  // right BMI callouts — same FS
  ctx.font=`${FS}px monospace`;ctx.fillStyle='#888';ctx.textAlign='left';ctx.textBaseline='middle';
  [[BH,'25.0'],[BM,'21.75'],[BL,'18.5']].forEach(([y,l])=>{if(y>=YMIN&&y<=YMAX)ctx.fillText(l,px(XMAX)+4,py(y));});

  // axis titles
  ctx.textBaseline='alphabetic';ctx.textAlign='center';
  ctx.fillText('体脂肪率 (%)',PAD.l+PW/2,H-4);
  ctx.save();ctx.translate(14,PAD.t+PH/2);ctx.rotate(-Math.PI/2);ctx.fillText('BMI (kg/m²)',0,0);ctx.restore();

  // plots
  const N=records.length;
  const pts=records.filter(r=>r.fatpct!=null&&r.bmi!=null).map(r=>({
    x:px(Math.max(XMIN,Math.min(XMAX,r.fatpct))),
    y:py(Math.max(YMIN,Math.min(YMAX,r.bmi)))
  }));
  const Np=pts.length;
  if(Np>0){
    drawConn(ctx,pts,Np);
    for(let i=0;i<Np-1;i++)drawDot(ctx,pts[i].x,pts[i].y,i/(Np-1));
    drawStar(ctx,pts[Np-1].x,pts[Np-1].y,11,'#FFD700');
  }
}
