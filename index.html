<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="InBody">
<meta name="theme-color" content="#111111">
<title>InBody トラッカー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<!-- INFO MODAL -->
<div class="info-overlay" id="info-modal" onclick="if(event.target===this)closeInfo()">
  <div class="info-sheet">
    <div class="info-header">
      <div class="info-title" id="info-title"></div>
      <button class="modal-close" onclick="closeInfo()">✕</button>
    </div>
    <div class="info-body" id="info-body"></div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal" onclick="closeModal(event)">
  <div class="modal-sheet">
    <div class="modal-header">
      <div class="modal-title" id="edit-modal-title">記録を編集</div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="card" style="margin-bottom:10px">
      <div class="card-title">基本情報</div>
      <div class="form-grid">
        <div class="form-field"><label class="form-label">測定日</label><input type="date" id="e-date" class="form-input"></div>
        <div class="form-field"><label class="form-label">体重 (kg)</label><input type="number" id="e-weight" class="form-input" step="0.1"></div>
        <div class="form-field"><label class="form-label">身長 (cm)</label><input type="number" id="e-height" class="form-input" step="0.1"></div>
      </div>
    </div>
    <div class="card" style="margin-bottom:10px">
      <div class="card-title">体組成</div>
      <div class="form-grid">
        <div class="form-field"><label class="form-label">筋肉量 (kg)</label><input type="number" id="e-muscle" class="form-input" step="0.1"></div>
        <div class="form-field"><label class="form-label">体脂肪量 (kg)</label><input type="number" id="e-fat" class="form-input" step="0.1"></div>
        <div class="form-field"><label class="form-label">体脂肪率 (%)</label><input type="number" id="e-fatpct" class="form-input" step="0.1"></div>
        <div class="form-field"><label class="form-label">体水分量 (kg)</label><input type="number" id="e-water" class="form-input" step="0.1"></div>
        <div class="form-field"><label class="form-label">タンパク質 (kg)</label><input type="number" id="e-protein" class="form-input" step="0.01"></div>
        <div class="form-field"><label class="form-label">ミネラル (kg)</label><input type="number" id="e-mineral" class="form-input" step="0.01"></div>
      </div>
    </div>
    <div class="card" style="margin-bottom:10px">
      <div class="card-title">評価指標</div>
      <div class="form-grid">
        <div class="form-field"><label class="form-label">BMI</label><input type="number" id="e-bmi" class="form-input" step="0.1"></div>
        <div class="form-field"><label class="form-label">内臓脂肪指数</label><input type="number" id="e-visceral" class="form-input" step="1"></div>
        <div class="form-field"><label class="form-label">腹囲 (cm)</label><input type="number" id="e-waist" class="form-input" step="0.1"></div>
        <div class="form-field"><label class="form-label">発達点数</label><input type="number" id="e-score" class="form-input" step="1"></div>
        <div class="form-field"><label class="form-label">基礎代謝 (kcal)</label><input type="number" id="e-bmr" class="form-input" step="1"></div>
        <div class="form-field"><label class="form-label">適正体重 (kg)</label><input type="number" id="e-ideal" class="form-input" step="0.1"></div>
      </div>
    </div>
    <div class="card" style="margin-bottom:10px">
      <div class="card-title">部位別筋肉量 (kg)</div>
      <div class="form-grid">
        <div class="form-field"><label class="form-label">右腕</label><input type="number" id="e-ra" class="form-input" step="0.01"></div>
        <div class="form-field"><label class="form-label">左腕</label><input type="number" id="e-la" class="form-input" step="0.01"></div>
        <div class="form-field"><label class="form-label">胴体</label><input type="number" id="e-trunk" class="form-input" step="0.1"></div>
        <div class="form-field"><label class="form-label">右脚</label><input type="number" id="e-rl" class="form-input" step="0.01"></div>
        <div class="form-field"><label class="form-label">左脚</label><input type="number" id="e-ll" class="form-input" step="0.01"></div>
      </div>
    </div>
    <div class="card" style="margin-bottom:14px">
      <div class="card-title">筋肉発達程度 (%)</div>
      <div class="form-grid-3">
        <div class="form-field"><label class="form-label">胴体</label><input type="number" id="e-dtrunk" class="form-input" step="0.1"></div>
        <div class="form-field"><label class="form-label">上半身</label><input type="number" id="e-dupper" class="form-input" step="0.1"></div>
        <div class="form-field"><label class="form-label">下半身</label><input type="number" id="e-dlower" class="form-input" step="0.1"></div>
      </div>
    </div>
    <button class="btn-primary" onclick="updateRecord()">保存する</button>
    <div class="save-msg" id="edit-save-msg"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg:#f4f3f0;--surface:#fff;--surface2:#f0ede8;--border:#e2ddd8;
  --text:#1a1814;--text2:#7a746e;--text3:#b0a89e;
  --accent:#2d6a4f;--accent3:#7f77dd;--good:#2d6a4f;--bad:#c0392b;
  --mono:'DM Mono',monospace;--sans:'Noto Sans JP',sans-serif;
  --radius:12px;--radius-sm:8px;--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--sans);color:var(--text)}
.app{display:flex;flex-direction:column;height:100%;height:100dvh}
.header{
  padding:0;
  background:var(--text);
  flex-shrink:0;
  overflow:hidden;
  position:relative;
}
.header-inner{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 13px;
  position:relative;z-index:1;
}
.header-wordmark{display:flex;align-items:baseline;gap:6px}
.header-title{
  font-size:20px;font-weight:700;letter-spacing:-.03em;
  color:#fff;font-family:var(--mono);
}
.header-title span{color:var(--accent-light,#6ee7b7)}
.header-badge{
  font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(255,255,255,0.45);font-family:var(--mono);
  border:1px solid rgba(255,255,255,0.2);border-radius:4px;
  padding:2px 5px;margin-left:2px;position:relative;top:-1px;
}
.header-sub{font-size:10px;color:rgba(255,255,255,0.35);font-family:var(--mono);margin-top:2px;letter-spacing:.06em}
.header-icon{
  width:36px;height:36px;background:rgba(255,255,255,0.08);
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:18px;border:1px solid rgba(255,255,255,0.12);
}
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:16px 16px calc(16px + var(--safe-bottom))}
.nav{display:flex;background:var(--text);border-top:1px solid rgba(255,255,255,0.08);flex-shrink:0;padding-bottom:var(--safe-bottom)}
.nav-btn{flex:1;border:none;background:transparent;padding:10px 4px 8px;font-size:10px;color:rgba(255,255,255,0.35);cursor:pointer;font-family:var(--sans);display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .15s}
.nav-btn.active{color:#6ee7b7}
.nav-btn svg{width:22px;height:22px}
.sec{display:none}.sec.active{display:block}
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:14px 16px;margin-bottom:12px}
.profile-bar{background:var(--text);color:#fff;border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.prof-item{text-align:center}
.prof-label{font-size:11px;opacity:.5;letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px;font-family:var(--mono)}
.prof-val{font-size:18px;font-weight:700;font-family:var(--mono)}
.prof-unit{font-size:11px;opacity:.6}
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.metric-label{font-size:12px;color:var(--text3);letter-spacing:.04em;text-transform:uppercase;font-family:var(--mono);margin-bottom:4px}
.metric-val{font-size:26px;font-weight:700;font-family:var(--mono);color:var(--text);letter-spacing:-.02em}
.metric-unit{font-size:12px;color:var(--text3)}
.metric-diff{font-size:14px;margin-top:3px;font-family:var(--mono)}
.metric-diff .good{color:var(--good)}.metric-diff .bad{color:var(--bad)}
.seg-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.seg-item{background:var(--surface2);border-radius:var(--radius-sm);padding:8px 6px;text-align:center}
.seg-label{font-size:11px;color:var(--text3);margin-bottom:3px}
.seg-val{font-size:16px;font-weight:700;font-family:var(--mono)}
.seg-diff{font-size:11px;font-family:var(--mono);margin-top:2px}
.comp-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.comp-row{background:var(--surface2);border-radius:var(--radius-sm);padding:8px 10px;display:flex;justify-content:space-between;align-items:center}
.comp-tappable{cursor:pointer;transition:background .15s}
.comp-tappable:active{background:var(--border)}
.comp-label{font-size:12px;color:var(--text2)}
.comp-val{font-size:14px;font-weight:700;font-family:var(--mono)}
.comp-unit{font-size:11px;color:var(--text3)}
.section-label{font-size:12px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin:18px 0 8px;padding-left:2px;font-family:var(--mono)}
.chart-wrap{position:relative;width:100%;height:180px}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text3);font-family:var(--mono)}

/* Axis range control */
.axis-ctrl{display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap}
.axis-ctrl label{font-size:11px;color:var(--text3);font-family:var(--mono);white-space:nowrap;width:16px}
.axis-input{width:56px;padding:4px 6px;font-size:12px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-family:var(--mono);text-align:center}
.axis-btn{padding:4px 10px;font-size:12px;background:var(--text);color:#fff;border:none;border-radius:6px;cursor:pointer;font-family:var(--mono);white-space:nowrap}
.axis-sep{color:var(--text3);font-size:11px}

/* Map axis controls */
.map-ctrl{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.map-ctrl-group{background:var(--surface2);border-radius:var(--radius-sm);padding:8px 10px}
.map-ctrl-label{font-size:12px;color:var(--text3);font-family:var(--mono);margin-bottom:5px;font-weight:700;letter-spacing:.04em}
.map-ctrl-row{display:flex;align-items:center;gap:4px}
.map-input{width:48px;padding:3px 5px;font-size:12px;border:1px solid var(--border);border-radius:5px;background:#fff;color:var(--text);font-family:var(--mono);text-align:center}
.map-btn{padding:5px 8px;font-size:12px;background:var(--text);color:#fff;border:none;border-radius:5px;cursor:pointer;font-family:var(--mono);margin-top:5px;width:100%}

.form-section{margin-bottom:12px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.form-field{margin-bottom:10px}
.form-label{font-size:13px;color:var(--text2);display:block;margin-bottom:4px;font-weight:500}
.form-input{width:100%;padding:9px 12px;font-size:15px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-family:var(--mono);appearance:none;-webkit-appearance:none}
.form-input:focus{outline:none;border-color:var(--accent)}
.btn-primary{width:100%;padding:14px;background:var(--text);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;font-family:var(--sans)}
.btn-img{width:100%;padding:16px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;font-family:var(--sans);margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px}
.img-drop{border:2px dashed var(--border);border-radius:var(--radius);padding:24px;text-align:center;color:var(--text3);font-size:13px;margin-bottom:10px;cursor:pointer}
.img-drop.has-img{border:2px solid var(--accent)}
.btn-parse{width:100%;padding:12px;background:var(--accent3);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--sans);margin-bottom:8px;display:none}
.parse-status{font-size:12px;color:var(--text2);min-height:18px;margin-bottom:10px;font-family:var(--mono)}
.card-title{font-size:13px;font-weight:700;color:var(--text2);letter-spacing:.04em;text-transform:uppercase;margin-bottom:10px}
.hist-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;position:relative}
.hist-date{font-size:11px;font-family:var(--mono);color:var(--text3);margin-bottom:6px}
.hist-row{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.hist-cell{text-align:center}
.hist-cell-label{font-size:9px;color:var(--text3)}
.hist-cell-val{font-size:14px;font-weight:700;font-family:var(--mono)}
.btn-del{position:absolute;top:10px;right:12px;background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:2px 6px}
canvas{display:block}
.save-msg{font-size:12px;color:var(--accent);font-family:var(--mono);text-align:center;margin-top:8px;min-height:16px}

/* Edit modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-sheet{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-height:90dvh;overflow-y:auto;padding:16px 16px calc(16px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.modal-overlay.open .modal-sheet{transform:translateY(0)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.modal-title{font-size:15px;font-weight:700;color:var(--text)}
.modal-close{background:var(--surface2);border:none;border-radius:50%;width:28px;height:28px;font-size:16px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center}
.hist-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;position:relative;cursor:pointer;transition:background .15s}
.hist-item:active{background:var(--surface2)}
.hist-edit-hint{font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:5px;text-align:right}
/* Chart jump nav */
.chart-jump-nav{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.jump-btn{padding:5px 10px;font-size:11px;background:var(--surface);border:1px solid var(--border);border-radius:20px;color:var(--text2);cursor:pointer;font-family:var(--mono);white-space:nowrap}
.jump-btn:active{background:var(--surface2)}
.back-top-btn{width:100%;text-align:center;padding:8px;font-size:11px;color:var(--text3);background:transparent;border:none;cursor:pointer;font-family:var(--mono);letter-spacing:.04em;margin-top:4px}
.back-top-btn:active{color:var(--text)}
/* Info modal */
.info-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.info-overlay.open{opacity:1;pointer-events:all}
.info-sheet{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;width:100%;padding:20px 20px calc(20px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.info-overlay.open .info-sheet{transform:translateY(0)}
.info-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.info-title{font-size:16px;font-weight:700;color:var(--text)}
.info-body{font-size:14px;color:var(--text2);line-height:1.75}
.metric-card{cursor:pointer;transition:background .15s}
.metric-card:active{background:var(--surface2)}</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-inner">
      <div>
        <div class="header-wordmark">
          <div class="header-title">InBody<span>Tracker</span></div>
          <div class="header-badge">by Uru</div>
        </div>
        <div class="header-sub">体組成トラッカー</div>
      </div>
      <div class="header-icon">💪</div>
    </div>
  </div>
  <div class="content" id="content">

    <!-- DASHBOARD -->
    <div id="sec-dashboard" class="sec active">
      <div id="db-profile" class="profile-bar"></div>
      <div class="metrics-grid" id="db-cards"></div>
      <div class="card"><div class="card-title">部位別筋肉量</div><div class="seg-grid" id="db-seg"></div></div>
      <div class="card"><div class="card-title">体組成</div><div class="comp-grid" id="db-comp"></div></div>
    </div>

    <!-- CHARTS -->
    <div id="sec-charts" class="sec"><div id="charts-root"></div></div>

    <!-- MAPS -->
    <div id="sec-maps" class="sec"><div id="maps-root"></div></div>

    <!-- ADD -->
    <div id="sec-add" class="sec">
      <div class="card">
        <div class="card-title">📷 画像から自動入力</div>
        <div style="background:var(--surface2);border-radius:var(--radius-sm);padding:9px 11px;font-size:11px;color:var(--text2);line-height:1.7;margin-bottom:12px">
          <div style="font-weight:700;margin-bottom:3px;color:var(--text)">手順</div>
          <div>① 下のボタンで <strong>プロンプトをコピー</strong></div>
          <div>② <a href="https://claude.ai" target="_blank" style="color:var(--accent);font-weight:700">claude.ai</a> を開き、画像を添付して貼り付けて送信</div>
          <div>③ JSONをコピーして下の枠に貼り付け → 自動入力</div>
        </div>

        <!-- Step 1: copy prompt -->
        <button class="btn-img" style="margin-bottom:4px;font-size:13px;padding:9px 10px" onclick="copyPrompt()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          ① プロンプトをコピーする
        </button>
        <div id="copy-msg" style="font-size:11px;color:var(--accent);font-family:var(--mono);min-height:12px;margin-bottom:4px;text-align:center"></div>

        <!-- Step 2: open claude -->
        <a href="https://claude.ai" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:9px 10px;background:#7c3aed;color:#fff;border-radius:var(--radius);font-size:13px;font-weight:700;text-decoration:none;margin-bottom:14px">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          ② claude.ai を開く
        </a>

        <!-- Step 3: paste JSON -->
        <div style="font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.05em;margin-bottom:5px">③ ClaudeのJSON出力をここに貼り付け</div>
        <textarea id="json-paste" rows="4" placeholder='{"date":"2026-05-15","weight":65.2,...}' style="width:100%;padding:10px;font-size:12px;font-family:var(--mono);border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);resize:vertical;line-height:1.5"></textarea>
        <button class="btn-primary" style="margin-top:8px;background:var(--accent)" onclick="fillFromJson()">フォームに自動入力する</button>
        <div id="json-msg" style="font-size:11px;font-family:var(--mono);min-height:14px;margin-top:6px;text-align:center"></div>
      </div>
      <div class="card">
        <div class="card-title">基本情報</div>
        <div class="form-grid">
          <div class="form-field"><label class="form-label">測定日</label><input type="date" id="f-date" class="form-input"></div>
          <div class="form-field"><label class="form-label">体重 (kg)</label><input type="number" id="f-weight" class="form-input" step="0.1"></div>

<script>
const KEY='inbody_records_v1';
const BIRTHDAY=new Date('1993-05-15');
const G70='#E59400',G80='#1D9E75',G90='#7F77DD';
let records=[];
let chartsBuilt=false;
let mapsDrawn=false;
// Chart instances keyed by canvas id
const chartInstances={};
// Chart default ranges: {yMin, yMax, xMinOffset, xMaxOffset} — x offsets relative to data range
const chartDefaults={
  'c-w':{yMin:61,yMax:68},'c-m':{yMin:29,yMax:34},'c-f':{yMin:7,yMax:14},

  'c-arms':{yMin:2.5,yMax:3.9},'c-legs':{yMin:7.8,yMax:10.2},'c-trunk':{yMin:23,yMax:27.5},

const SEED=[
  {date:'2026-04-06',height:169,weight:65.2,muscle:29.9,fat:12.0,fatpct:18.3,bmi:22.8,visceral:46,waist:78,score:77,bmr:1520,ideal:62.9,water:39.1,protein:10.6,mineral:3.53,ra:2.82,la:2.83,trunk:23.4,rl:8.39,ll:8.36,devTrunk:97.1,devUpper:99.9,devLower:99.6},
  {date:'2026-04-12',height:169,weight:65.2,muscle:29.9,fat:12.0,fatpct:18.4,bmi:22.8,visceral:48,waist:79,score:77,bmr:1520,ideal:62.9,water:39.1,protein:10.6,mineral:3.54,ra:2.88,la:2.91,trunk:23.7,rl:8.20,ll:8.26,devTrunk:98.5,devUpper:97.6,devLower:98.4},
  {date:'2026-04-19',height:169,weight:65.3,muscle:30.2,fat:11.6,fatpct:17.8,bmi:22.9,visceral:46,waist:79,score:78,bmr:1530,ideal:63.2,water:39.4,protein:10.8,mineral:3.54,ra:2.91,la:2.98,trunk:24.0,rl:8.24,ll:8.37,devTrunk:99.4,devUpper:98.1,devLower:99.6},
  {date:'2026-04-26',height:169,weight:65.9,muscle:30.7,fat:11.4,fatpct:17.3,bmi:23.1,visceral:45,waist:79,score:79,bmr:1547,ideal:64.1,water:40.0,protein:10.8,mineral:3.65,ra:2.99,la:3.02,trunk:24.3,rl:8.33,ll:8.46,devTrunk:100.5,devUpper:98.9,devLower:100.5},
  {date:'2026-05-06',height:169,weight:66.7,muscle:30.6,fat:12.5,fatpct:18.7,bmi:23.4,visceral:49,waist:80,score:78,bmr:1541,ideal:63.8,water:39.8,protein:10.8,mineral:3.55,ra:2.91,la:2.98,trunk:24.1,rl:8.40,ll:8.47,devTrunk:99.4,devUpper:99.5,devLower:100.3},
  {date:'2026-05-09',height:169,weight:66.2,muscle:30.6,fat:12.0,fatpct:18.1,bmi:23.2,visceral:48,waist:81,score:78,bmr:1541,ideal:63.8,water:39.8,protein:10.8,mineral:3.55,ra:3.06,la:3.00,trunk:24.5,rl:8.15,ll:8.32,devTrunk:101.3,devUpper:96.7,devLower:98.7},
];

function calcAge(d){return(new Date(d).getTime()-BIRTHDAY.getTime())/(365.25*24*3600*1000);}
function fmt(v,d=1){return v!=null&&v!==''?parseFloat(v).toFixed(d):'—';}
function lerp(a,b,t){return a+(b-a)*t;}
function ptColor(t){const v=Math.round(lerp(0xd0,0x11,t));return `rgb(${v},${v},${v})`;}

function loadStorage(){try{const s=localStorage.getItem(KEY);if(s)return JSON.parse(s);}catch(e){}return null;}
function saveStorage(){try{localStorage.setItem(KEY,JSON.stringify(records));}catch(e){}}

function init(){
  const stored=loadStorage();
  if(stored&&stored.length>0){
    records=stored;
    const dates=new Set(records.map(r=>r.date));
    SEED.forEach(s=>{if(!dates.has(s.date))records.push(s);});
  } else {
    records=[...SEED];
  }
  records.sort((a,b)=>a.date.localeCompare(b.date));
  saveStorage();
  renderAll();
  document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
}

function renderAll(){renderDashboard();renderHistory();}

function sw(t){
  ['dashboard','charts','maps','add','history'].forEach(id=>{
    document.getElementById('sec-'+id).classList.toggle('active',id===t);
    document.getElementById('nav-'+id).classList.toggle('active',id===t);
  });
  document.getElementById('content').scrollTop=0;
  if(t==='charts')renderCharts();
  if(t==='maps')renderMaps();
}

function renderDashboard(){
  if(!records.length)return;
  const r=records[records.length-1];
  const p=records.length>1?records[records.length-2]:null;
  const ageYears=Math.floor(calcAge(r.date));
  document.getElementById('db-profile').innerHTML=`
    <div class="prof-item"><div class="prof-label">年齢</div><div class="prof-val">${ageYears}<span class="prof-unit">歳</span></div></div>
    <div class="prof-item"><div class="prof-label">身長</div><div class="prof-val">${r.height||169}<span class="prof-unit">cm</span></div></div>
    <div class="prof-item"><div class="prof-label">性別</div><div class="prof-val" style="font-size:14px;font-family:var(--sans)">男性</div></div>
    <div class="prof-item"><div class="prof-label">測定日</div><div class="prof-val" style="font-size:16px">${r.date.slice(5).replace('-','/')}</div></div>`;

  function diff(cur,prv,lower=false){
    if(cur==null||prv==null)return '<span style="color:var(--text3)">—</span>';
    const d=parseFloat(cur)-parseFloat(prv);
    if(Math.abs(d)<0.01)return '<span style="color:var(--text3)">→</span>';
    const g=lower?d<0:d>0;
    return `<span class="${g?'good':'bad'}">${d>0?'▲':'▼'} ${Math.abs(d).toFixed(1)}</span>`;
  }

  const ICONS={
    weight:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="6" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>`,
    muscle:`<svg viewBox="0 0 28 24" xmlns="http://www.w3.org/2000/svg">
      <!-- left outer plate: tall & wide -->
      <rect x="0" y="3" width="4.5" height="18" rx="2" fill="currentColor"/>
      <!-- left outer highlight -->
      <rect x="0.8" y="4.5" width="2.2" height="15" rx="1.1" fill="white" opacity="0.45"/>
      <!-- left inner plate -->
      <rect x="4.5" y="6.5" width="3.5" height="11" rx="1.5" fill="currentColor"/>
      <!-- left inner highlight -->
      <rect x="5.2" y="7.5" width="1.8" height="9" rx="0.8" fill="white" opacity="0.45"/>
      <!-- bar -->
      <rect x="8" y="10.5" width="12" height="3" rx="1" fill="currentColor"/>
      <!-- right inner plate -->
      <rect x="20" y="6.5" width="3.5" height="11" rx="1.5" fill="currentColor"/>
      <!-- right inner highlight -->
      <rect x="20.7" y="7.5" width="1.8" height="9" rx="0.8" fill="white" opacity="0.45"/>
      <!-- right outer plate: tall & wide -->
      <rect x="23.5" y="3" width="4.5" height="18" rx="2" fill="currentColor"/>
      <!-- right outer highlight -->
      <rect x="24.3" y="4.5" width="2.2" height="15" rx="1.1" fill="white" opacity="0.45"/>
    </svg>`,
    fat:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6.5 5.5C6.5 4.2 7.5 3.5 8.8 3.5h6.4c1.3 0 2.3.7 2.3 2 .9.4 1.5 1.2 1.5 2.2s-.6 1.9-1.5 2.2v2c0 1.4-1 2.2-2.3 2.2H8.8c-1.3 0-2.3-.8-2.3-2.2V9.9C5.6 9.5 5 8.7 5 7.7s.6-1.8 1.5-2.2z"/>
      <circle cx="2.8" cy="6.2" r="2" fill="white" stroke="currentColor"/>
      <circle cx="2.8" cy="9.4" r="2" fill="white" stroke="currentColor"/>
      <circle cx="21.2" cy="6.2" r="2" fill="white" stroke="currentColor"/>
      <circle cx="21.2" cy="9.4" r="2" fill="white" stroke="currentColor"/>
      <path d="M9.5 11.5q1.2-1 2.5 0"/>
      <path d="M12 11.5q1.2-1 2.5 0"/>
    </svg>`,
    bmi:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="3" x2="12" y2="21"/><line x1="6" y1="21" x2="18" y2="21"/><path d="M6 9l-4 6h8L6 9z"/><path d="M18 9l-4 6h8l-4-6z"/><line x1="6" y1="9" x2="18" y2="9"/></svg>`,
    fatpct:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10H12V2z"/><path d="M12 2a10 10 0 0 1 10 10"/></svg>`,
    score:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
  };

  document.getElementById('db-cards').innerHTML=[
    ['体重','weight','kg',true],['筋肉量','muscle','kg',false],
    ['体脂肪量','fat','kg',true],['体脂肪率','fatpct','%',true],
    ['BMI','bmi','',true],['発達点数','score','点',false],
  ].map(([l,k,u,lo])=>`<div class="metric-card" style="position:relative;overflow:hidden" onclick="openInfo('${k}')">
    <div style="position:absolute;top:6px;right:6px;width:56px;height:56px;opacity:.08;color:var(--text)">${ICONS[k]||''}</div>
    <div style="position:absolute;top:8px;right:8px;font-size:9px;color:var(--text3);font-family:var(--mono);opacity:.5">ⓘ</div>
    <div class="metric-label">${l}</div>
    <div><span class="metric-val">${fmt(r[k],k==='score'?0:1)}</span><span class="metric-unit"> ${u}</span></div>
    <div class="metric-diff">${p?diff(r[k],p[k],lo):'—'}</div>
  </div>`).join('');

  // ── 部位別筋肉量：左に人体SVG・右にHTMLリスト ──
  const SEG=[
    {key:'ra',  label:'右腕', dec:2, fill:'#378ADD', bg:'#EFF6FF', border:'#378ADD', lc:'#1a5fa0'},
    {key:'la',  label:'左腕', dec:2, fill:'#85B7EB', bg:'#EFF6FF', border:'#85B7EB', lc:'#1a5fa0'},
    {key:'trunk',label:'胴体',dec:1, fill:'#E8C84A', bg:'#FFFBEA', border:'#C8A800', lc:'#8A7000'},

    {key:'ll',  label:'左脚', dec:2, fill:'#F0997B', bg:'#FFF4EF', border:'#F0997B', lc:'#a03010'},
  ];
  function segDiff(v,pv){
    if(v==null||pv==null)return{txt:'—',col:'#bbb'};
    const d=parseFloat(v)-parseFloat(pv);
    if(Math.abs(d)<0.005)return{txt:'→',col:'#bbb'};
    return{txt:(d>0?'▲':'▼')+Math.abs(d).toFixed(2),col:d>0?'#1D9E75':'#D85A30'};
  }

  // 人体SVG（足を太く・左右余白均等）
  const figSvg=`<svg viewBox="0 0 70 210" width="70" height="210" style="flex-shrink:0;display:block">
    <circle cx="35" cy="16" r="14" fill="#555"/>

  const listHtml=SEG.map(s=>{

    return `<div style="display:flex;align-items:center;gap:6px;padding:0 10px;background:${s.bg};border-radius:8px;border-left:3px solid ${s.border};height:36px">

    </div>`;
  }).join('<div style="height:3px"></div>');

function renderHistory(){
  const root=document.getElementById('hist-root');
  if(!records.length){root.innerHTML='<p style="text-align:center;color:var(--text3);padding:2rem;font-size:13px">記録がありません</p>';return;}

  [...records].reverse().map(r=>`
    <div class="hist-item" onclick="editRecord('${r.date}')">
      <div class="hist-date" style="font-size:13px">${r.date}</div>
      <div class="hist-row">
        <div class="hist-cell"><div class="hist-cell-label" style="font-size:11px">体重</div><div class="hist-cell-val" style="font-size:17px">${fmt(r.weight)}</div></div>
        <div class="hist-cell"><div class="hist-cell-label" style="font-size:11px">筋肉量</div><div class="hist-cell-val" style="font-size:17px">${fmt(r.muscle)}</div></div>
        <div class="hist-cell"><div class="hist-cell-label" style="font-size:11px">体脂肪率</div><div class="hist-cell-val" style="font-size:17px">${fmt(r.fatpct)}%</div></div>
        <div class="hist-cell"><div class="hist-cell-label" style="font-size:11px">点数</div><div class="hist-cell-val" style="font-size:17px">${r.score||'—'}</div></div>
      </div>
      <button class="btn-del" onclick="event.stopPropagation();del('${r.date}')">✕</button>
    </div>`).join('');
}

function closeInfo(){

}

let editingDate=null;

function editRecord(date){
  const r=records.find(x=>x.date===date);if(!r)return;
  editingDate=date;
  document.getElementById('edit-modal-title').textContent=date+' を編集';
  const map={date:'e-date',height:'e-height',weight:'e-weight',muscle:'e-muscle',fat:'e-fat',
    fatpct:'e-fatpct',bmi:'e-bmi',visceral:'e-visceral',waist:'e-waist',score:'e-score',
    bmr:'e-bmr',ideal:'e-ideal',water:'e-water',protein:'e-protein',mineral:'e-mineral',
    ra:'e-ra',la:'e-la',trunk:'e-trunk',rl:'e-rl',ll:'e-ll',
    devTrunk:'e-dtrunk',devUpper:'e-dupper',devLower:'e-dlower'};
  Object.entries(map).forEach(([k,id])=>{
    const el=document.getElementById(id);
    if(el) el.value=r[k]!=null?r[k]:'';
  });
  document.getElementById('edit-save-msg').textContent='';
  document.getElementById('edit-modal').classList.add('open');
}

function closeModalDirect(){
  document.getElementById('edit-modal').classList.remove('open');
}
function closeModal(e){
  if(e.target===document.getElementById('edit-modal')) closeModalDirect();
}

function updateRecord(){
  const v=id=>{const x=parseFloat(document.getElementById(id).value);return isNaN(x)?null:x;};
  const newDate=document.getElementById('e-date').value;
  if(!newDate){alert('測定日を入力してください');return;}
  const updated={date:newDate,height:v('e-height'),weight:v('e-weight'),muscle:v('e-muscle'),
    fat:v('e-fat'),fatpct:v('e-fatpct'),bmi:v('e-bmi'),visceral:v('e-visceral'),waist:v('e-waist'),
    score:v('e-score'),bmr:v('e-bmr'),ideal:v('e-ideal'),water:v('e-water'),protein:v('e-protein'),
    mineral:v('e-mineral'),ra:v('e-ra'),la:v('e-la'),trunk:v('e-trunk'),rl:v('e-rl'),ll:v('e-ll'),
    devTrunk:v('e-dtrunk'),devUpper:v('e-dupper'),devLower:v('e-dlower')};
  // Remove old entry (handles date change too)
  records=records.filter(r=>r.date!==editingDate);
  records.push(updated);
  records.sort((a,b)=>a.date.localeCompare(b.date));
  saveStorage();renderAll();mapsDrawn=false;chartsBuilt=false;
  const m=document.getElementById('edit-save-msg');
  m.textContent='✅ 保存しました';
  setTimeout(()=>closeModalDirect(),900);
}

function del(date){
  if(!confirm(date+' を削除しますか？'))return;
  records=records.filter(r=>r.date!==date);
  saveStorage();renderAll();mapsDrawn=false;chartsBuilt=false;
}

function copyPrompt(){
  const prompt=`InBodyの体組成測定結果シートの画像からデータを読み取り、以下のJSON形式のみで返してください。値が読み取れない場合はnullにしてください。前置き・説明文は不要です。JSONのみ返してください。

{"date":"YYYY-MM-DD","height":null,"weight":null,"muscle":null,"fat":null,"fatpct":null,"bmi":null,"visceral":null,"waist":null,"score":null,"bmr":null,"ideal":null,"water":null,"protein":null,"mineral":null,"ra":null,"la":null,"trunk":null,"rl":null,"ll":null,"devTrunk":null,"devUpper":null,"devLower":null}`;
  navigator.clipboard.writeText(prompt).then(()=>{
    const m=document.getElementById('copy-msg');
    m.textContent='✅ コピーしました！claude.aiに貼り付けてください';
    setTimeout(()=>m.textContent='',4000);
  }).catch(()=>{
    // fallback for older browsers
    const ta=document.createElement('textarea');
    ta.value=prompt;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');
    document.body.removeChild(ta);
    const m=document.getElementById('copy-msg');
    m.textContent='✅ コピーしました！claude.aiに貼り付けてください';
    setTimeout(()=>m.textContent='',4000);
  });
}

function fillFromJson(){
  const raw=document.getElementById('json-paste').value.trim();
  const msg=document.getElementById('json-msg');
  if(!raw){msg.textContent='❌ JSONを貼り付けてください';msg.style.color='var(--bad)';return;}
  let parsed;
  try{
    const m=raw.match(/\{[\s\S]*\}/);
    if(!m)throw new Error('JSONが見つかりません');
    parsed=JSON.parse(m[0]);
  }catch(e){
    msg.textContent='❌ 読み取り失敗：正しいJSONを貼り付けてください';msg.style.color='var(--bad)';return;
  }
  const fields={date:'f-date',height:'f-height',weight:'f-weight',muscle:'f-muscle',fat:'f-fat',
    fatpct:'f-fatpct',bmi:'f-bmi',visceral:'f-visceral',waist:'f-waist',score:'f-score',
    bmr:'f-bmr',ideal:'f-ideal',water:'f-water',protein:'f-protein',mineral:'f-mineral',
    ra:'f-ra',la:'f-la',trunk:'f-trunk',rl:'f-rl',ll:'f-ll',
    devTrunk:'f-dtrunk',devUpper:'f-dupper',devLower:'f-dlower'};
  let filled=0;
  Object.entries(fields).forEach(([k,id])=>{
    const el=document.getElementById(id);
    if(el&&parsed[k]!=null){el.value=parsed[k];filled++;}
  });
  document.getElementById('json-paste').value='';
  msg.textContent=`✅ ${filled}項目を自動入力しました。内容を確認して「保存する」を押してください。`;
  msg.style.color='var(--accent)';
  // scroll down to the form
  document.getElementById('content').scrollTop+=200;
}

function saveEntry(){
  const v=id=>{const x=parseFloat(document.getElementById(id).value);return isNaN(x)?null:x;};
  const date=document.getElementById('f-date').value;
  if(!date){alert('測定日を入力してください');return;}
  const e={date,height:v('f-height'),weight:v('f-weight'),muscle:v('f-muscle'),fat:v('f-fat'),fatpct:v('f-fatpct'),bmi:v('f-bmi'),visceral:v('f-visceral'),waist:v('f-waist'),score:v('f-score'),bmr:v('f-bmr'),ideal:v('f-ideal'),water:v('f-water'),protein:v('f-protein'),mineral:v('f-mineral'),ra:v('f-ra'),la:v('f-la'),trunk:v('f-trunk'),rl:v('f-rl'),ll:v('f-ll'),devTrunk:v('f-dtrunk'),devUpper:v('f-dupper'),devLower:v('f-dlower')};
  const idx=records.findIndex(r=>r.date===date);
  if(idx>=0)records[idx]=e;else records.push(e);
  records.sort((a,b)=>a.date.localeCompare(b.date));
  saveStorage();renderAll();mapsDrawn=false;chartsBuilt=false;
  const m=document.getElementById('save-msg');m.textContent='保存しました ✓';setTimeout(()=>m.textContent='',2000);
}

/* ===== CHARTS ===== */
function renderCharts(){
  if(chartsBuilt)return;chartsBuilt=true;
  const root=document.getElementById('charts-root');root.innerHTML='';
  const BASE=new Date(records[0].date).getTime(),MSD=86400000;
  const xVals=records.map(r=>(new Date(r.date).getTime()-BASE)/MSD);
  const xlabels=records.map(r=>r.date.slice(5).replace('-','/'));
  const N=records.length;
  const get=k=>records.map(r=>r[k]!=null?parseFloat(parseFloat(r[k]).toFixed(2)):null);
  // store globally for axis updates
  _xVals=xVals;_xlabels=xlabels;
  _xMin=xVals[0]-1;_xMax=xVals[N-1]+1;

  function xO(xMin,xMax){return{type:'linear',min:xMin,max:xMax,ticks:{font:{size:10},callback:v=>{const i=_xVals.indexOf(v);return i>=0?_xlabels[i]:null;},stepSize:1,autoSkip:false,maxRotation:0},grid:{color:'rgba(0,0,0,0.05)'}};}

  function mkChart(id,dss,refs,yMin,yMax){
    const allDs=[
      ...dss.map(d=>({label:d.label,data:xVals.map((x,i)=>({x,y:d.raw[i]})),borderColor:d.color,backgroundColor:'transparent',borderWidth:2,borderDash:d.dash||[],pointRadius:4,pointBackgroundColor:d.color,tension:0.3})),
      ...refs.map(d=>({label:d.label,data:xVals.map(x=>({x,y:d.val})),borderColor:d.color,backgroundColor:'transparent',borderWidth:1,borderDash:[5,4],pointRadius:0,pointHoverRadius:0,tension:0}))
    ];
    const c=new Chart(document.getElementById(id),{type:'line',data:{datasets:allDs},options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,callbacks:{
        title:is=>{const x=is[0].parsed.x;const i=_xVals.indexOf(x);return i>=0?records[i].date:'';},
        label:ctx=>ctx.dataset.pointRadius===0?null:`${ctx.dataset.label}: ${ctx.parsed.y}`
      }}},
      scales:{x:xO(_xMin,_xMax),y:{ticks:{font:{size:10}},min:yMin,max:yMax,grid:{color:'rgba(0,0,0,0.05)'}}}
    }});
    chartInstances[id]=c;
  }

  const BASE_MS=new Date(records[0].date).getTime();
  function dateToOffset(dateStr){return(new Date(dateStr).getTime()-BASE_MS)/86400000;}
  const defaultXMinDate=records[0].date;
  const defaultXMaxDate=records[records.length-1].date;

  function axisCtrl(id,def){
    return `<div class="map-ctrl" style="margin-bottom:8px">
      <div class="map-ctrl-group">
        <div class="map-ctrl-label">X軸（期間）</div>
        <div class="map-ctrl-row">
          <input class="map-input" style="width:82px;font-size:10px" id="xmin-${id}" type="date" value="${defaultXMinDate}">
          <span style="font-size:11px;color:var(--text3)">〜</span>
          <input class="map-input" style="width:82px;font-size:10px" id="xmax-${id}" type="date" value="${defaultXMaxDate}">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:5px">
          <button class="map-btn" style="margin-top:0;font-size:10px;padding:5px 4px;white-space:nowrap" id="apply-x-${id}">適用</button>
          <button class="map-btn" style="margin-top:0;font-size:10px;padding:5px 4px;white-space:nowrap;background:var(--text3)" id="reset-x-${id}">リセット</button>
        </div>
      </div>
      <div class="map-ctrl-group">
        <div class="map-ctrl-label">Y軸（値）</div>
        <div class="map-ctrl-row">
          <input class="map-input" id="ymin-${id}" type="number" value="${def.yMin}" step="0.1">
          <span style="font-size:11px;color:var(--text3)">〜</span>
          <input class="map-input" id="ymax-${id}" type="number" value="${def.yMax}" step="0.1">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:5px">
          <button class="map-btn" style="margin-top:0;font-size:10px;padding:5px 4px;white-space:nowrap" id="apply-y-${id}">適用</button>
          <button class="map-btn" style="margin-top:0;font-size:10px;padding:5px 4px;white-space:nowrap;background:var(--text3)" id="reset-y-${id}">リセット</button>
        </div>
      </div>
    </div>`;
  }

  function leg(c,l,d=false){return `<div class="legend-item"><span style="display:inline-block;width:16px;height:${d?'2px':'3px'};${d?'border-top:2px dashed '+c:'background:'+c}"></span>${l}</div>`;}

  function card(title,legH,cid){
    const def=chartDefaults[cid];
    const div=document.createElement('div');div.className='card';div.id='card-'+cid;
    div.innerHTML=`<div class="card-title">${title}</div><div class="legend">${legH}</div>${axisCtrl(cid,def)}<div class="chart-wrap"><canvas id="${cid}"></canvas></div><button class="back-top-btn" onclick="document.getElementById('content').scrollTop=0">↑ トップへ戻る</button>`;
    root.appendChild(div);

    // Wire up buttons after DOM is ready — avoids onclick/window[] timing issues
    div.querySelector('#apply-x-'+cid).addEventListener('click',()=>{
      const c=chartInstances[cid];if(!c)return;
      const xMinDate=document.getElementById('xmin-'+cid).value;
      const xMaxDate=document.getElementById('xmax-'+cid).value;
      if(!xMinDate||!xMaxDate){alert('日付を入力してください');return;}
      const xMn=dateToOffset(xMinDate)-0.5;
      const xMx=dateToOffset(xMaxDate)+0.5;
      if(xMn>=xMx){alert('開始日は終了日より前にしてください');return;}
      c.config.options.scales.x.min=xMn;
      c.config.options.scales.x.max=xMx;
      c.update();
    });
    div.querySelector('#reset-x-'+cid).addEventListener('click',()=>{
      const c=chartInstances[cid];if(!c)return;
      c.config.options.scales.x.min=_xMin;
      c.config.options.scales.x.max=_xMax;
      c.update();
      document.getElementById('xmin-'+cid).value=defaultXMinDate;
      document.getElementById('xmax-'+cid).value=defaultXMaxDate;
    });
    div.querySelector('#apply-y-'+cid).addEventListener('click',()=>{
      const c=chartInstances[cid];if(!c)return;
      const yMn=parseFloat(document.getElementById('ymin-'+cid).value);
      const yMx=parseFloat(document.getElementById('ymax-'+cid).value);
      if(isNaN(yMn)||isNaN(yMx)||yMn>=yMx){alert('正しい範囲を入力してください');return;}
      c.config.options.scales.y.min=yMn;
      c.config.options.scales.y.max=yMx;
      c.update();
    });
    div.querySelector('#reset-y-'+cid).addEventListener('click',()=>{
      const c=chartInstances[cid];if(!c)return;
      const def=chartDefaults[cid];
      c.config.options.scales.y.min=def.yMin;
      c.config.options.scales.y.max=def.yMax;
      c.update();
      document.getElementById('ymin-'+cid).value=def.yMin;
      document.getElementById('ymax-'+cid).value=def.yMax;
    });
  }

  function sl(t,id){
    const p=document.createElement('div');p.className='section-label';
    if(id)p.id='sl-'+id;
    p.textContent=t;root.appendChild(p);
  }
  function ds(l,k,c,d){return{label:l,raw:get(k),color:c,dash:d};}
  function rf(l,v,c){return{label:l,val:v,color:c};}

  // Jump nav — 14 individual charts
  const nav=document.createElement('div');nav.className='chart-jump-nav';
  nav.innerHTML=[
    ['体重','c-w'],['筋肉量','c-m'],['体脂肪量','c-f'],['体脂肪率','c-fp'],
    ['発達点数','c-sc'],['BMI','c-bmi'],['基礎代謝','c-bmr'],['内臓脂肪','c-vis'],
    ['腕','c-arms'],['脚','c-legs'],['胴体','c-trunk'],
    ['体水分量','c-wat'],['タンパク質','c-pro'],['ミネラル','c-min'],
  ].map(([l,id])=>`<button class="jump-btn" onclick="document.getElementById('card-${id}')?.scrollIntoView({behavior:'smooth',block:'start'})">${l}</button>`).join('');
  root.appendChild(nav);

  sl('体重・体組成','comp');
  card('体重 (kg)',leg('#378ADD','体重')+leg(G70,'70点',true)+leg(G80,'80点',true)+leg(G90,'90点',true),'c-w');
  mkChart('c-w',[ds('体重','weight','#378ADD')],[rf('70',64.5,G70),rf('80',63.5,G80),rf('90',62.5,G90)],61,68);
  card('筋肉量 (kg)',leg('#1D9E75','筋肉量')+leg(G70,'70点',true)+leg(G80,'80点',true)+leg(G90,'90点',true),'c-m');
  mkChart('c-m',[ds('筋肉量','muscle','#1D9E75')],[rf('70',30.5,G70),rf('80',31.5,G80),rf('90',32.7,G90)],29,34);
  card('体脂肪量 (kg)',leg('#D85A30','体脂肪量')+leg(G70,'70点',true)+leg(G80,'80点',true)+leg(G90,'90点',true),'c-f');
  mkChart('c-f',[ds('体脂肪量','fat','#D85A30')],[rf('70',12.5,G70),rf('80',11.0,G80),rf('90',9.0,G90)],7,14);
  card('体脂肪率 (%)',leg('#D85A30','体脂肪率')+leg(G70,'70点',true)+leg(G80,'80点',true)+leg(G90,'90点',true),'c-fp');
  mkChart('c-fp',[ds('体脂肪率','fatpct','#D85A30')],[rf('70',19,G70),rf('80',17,G80),rf('90',15,G90)],13,22);
  sl('評価指標','eval');
  card('発達点数',leg('#7F77DD','発達点数')+leg(G70,'70',true)+leg(G80,'80',true)+leg(G90,'90',true),'c-sc');
  mkChart('c-sc',[ds('発達点数','score','#7F77DD')],[rf('70',70,G70),rf('80',80,G80),rf('90',90,G90)],65,95);
  card('BMI',leg('#BA7517','BMI')+leg('#aaa','標準',true),'c-bmi');
  mkChart('c-bmi',[ds('BMI','bmi','#BA7517')],[rf('下限',18.5,'#aaa'),rf('上限',25.0,'#aaa')],17,27);
  card('基礎代謝量 (kcal)',leg('#534AB7','基礎代謝')+leg(G70,'70点',true)+leg(G80,'80点',true)+leg(G90,'90点',true),'c-bmr');
  mkChart('c-bmr',[ds('基礎代謝','bmr','#534AB7')],[rf('70',1540,G70),rf('80',1570,G80),rf('90',1600,G90)],1480,1630);
  card('内臓脂肪指数',leg('#D4537E','内臓脂肪')+leg(G70,'70点',true)+leg(G80,'80点',true)+leg(G90,'90点',true),'c-vis');

/* ===== MAPS ===== */
function drawStar(ctx,cx,cy,r,fill){
  ctx.beginPath();
  for(let i=0;i<10;i++){const ang=(i*Math.PI/5)-Math.PI/2,rad=i%2===0?r:r*0.42;i===0?ctx.moveTo(cx+Math.cos(ang)*rad,cy+Math.sin(ang)*rad):ctx.lineTo(cx+Math.cos(ang)*rad,cy+Math.sin(ang)*rad);}
  ctx.closePath();ctx.fillStyle=fill;ctx.fill();ctx.strokeStyle='#000';ctx.lineWidth=1.5;ctx.stroke();
}
function drawDot(ctx,x,y,t){
  ctx.beginPath();ctx.arc(x,y,8,0,Math.PI*2);
  ctx.fillStyle=ptColor(t);ctx.fill();
  ctx.strokeStyle=t<0.5?'rgba(60,60,60,0.8)':'rgba(220,220,220,0.9)';ctx.lineWidth=1.5;ctx.stroke();
}
function drawConn(ctx,pts,N){
  for(let i=0;i<N-1;i++){
    const t0=i/(N-1),t1=(i+1)/(N-1),{x:x0,y:y0}=pts[i],{x:x1,y:y1}=pts[i+1];
    const g=ctx.createLinearGradient(x0,y0,x1,y1);g.addColorStop(0,ptColor(t0));g.addColorStop(1,ptColor(t1));
    ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.strokeStyle=g;ctx.lineWidth=1.8;ctx.stroke();
    const mx=x0*0.38+x1*0.62,my=y0*0.38+y1*0.62,dx=x1-x0,dy=y1-y0,len=Math.sqrt(dx*dx+dy*dy);
    if(len>6){const ux=dx/len,uy=dy/len,r=5,tc=(t0+t1)/2,cv=Math.round(lerp(0xd0,0x11,tc));
      ctx.beginPath();ctx.moveTo(mx+ux*r,my+uy*r);ctx.lineTo(mx-ux*r-uy*r*0.6,my-uy*r+ux*r*0.6);ctx.lineTo(mx-ux*r+uy*r*0.6,my-uy*r-ux*r*0.6);
      ctx.closePath();ctx.fillStyle=`rgba(${cv},${cv},${cv},0.75)`;ctx.fill();}
  }
}

function applyVisMap(){
  const xMin=parseFloat(document.getElementById('vis-xmin').value);
  const xMax=parseFloat(document.getElementById('vis-xmax').value);
  const yMin=parseFloat(document.getElementById('vis-ymin').value);
  const yMax=parseFloat(document.getElementById('vis-ymax').value);
  if(isNaN(xMin)||isNaN(xMax)||isNaN(yMin)||isNaN(yMax)||xMin>=xMax||yMin>=yMax){alert('正しい範囲を入力してください');return;}
  mapState.vis={xMin,xMax,yMin,yMax};
  drawVisMap();
}

function resetVisMap(){
  mapState.vis={xMin:25,xMax:40,yMin:0,yMax:120};
  document.getElementById('vis-xmin').value=mapState.vis.xMin;
  document.getElementById('vis-xmax').value=mapState.vis.xMax;
  document.getElementById('vis-ymin').value=mapState.vis.yMin;
  document.getElementById('vis-ymax').value=mapState.vis.yMax;
  drawVisMap();
}

function applyBodyMap(){
  const xMin=parseFloat(document.getElementById('body-xmin').value);
  const xMax=parseFloat(document.getElementById('body-xmax').value);
  const yMin=parseFloat(document.getElementById('body-ymin').value);
  const yMax=parseFloat(document.getElementById('body-ymax').value);
  if(isNaN(xMin)||isNaN(xMax)||isNaN(yMin)||isNaN(yMax)||xMin>=xMax||yMin>=yMax){alert('正しい範囲を入力してください');return;}
  mapState.body={xMin,xMax,yMin,yMax};
  drawBodyMap();
}

function resetBodyMap(){
  mapState.body={xMin:5,xMax:25,yMin:15,yMax:28};
  document.getElementById('body-xmin').value=mapState.body.xMin;
  document.getElementById('body-xmax').value=mapState.body.xMax;
  document.getElementById('body-ymin').value=mapState.body.yMin;
  document.getElementById('body-ymax').value=mapState.body.yMax;
  drawBodyMap();
}

function drawVisMap(){
  const cv=document.getElementById('cv');
  if(!cv)return;
  const W=cv.width,H=cv.height,ctx=cv.getContext('2d');
  const PAD={l:62,r:22,t:26,b:54},PW=W-PAD.l-PAD.r,PH=H-PAD.t-PAD.b;
  const {xMin:XMIN,xMax:XMAX,yMin:YMIN,yMax:YMAX}=mapState.vis;
  const px=x=>PAD.l+(x-XMIN)/(XMAX-XMIN)*PW;
  const py=y=>PAD.t+(1-(y-YMIN)/(YMAX-YMIN))*PH;
  const FS=18; // uniform font size
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);

  // distribution band
  const allDist=[{age:20,lo:5,hi:60},{age:25,lo:5,hi:70},{age:27,lo:6,hi:75},{age:30,lo:8,hi:85},{age:32,lo:8,hi:87},{age:35,lo:10,hi:100},{age:37,lo:11,hi:105},{age:40,lo:12,hi:115},{age:45,lo:15,hi:125},{age:50,lo:18,hi:138},{age:55,lo:20,hi:148},{age:60,lo:22,hi:158},{age:65,lo:22,hi:165},{age:70,lo:20,hi:168}];
  const dist=allDist.filter(d=>d.age>=XMIN-5&&d.age<=XMAX+5);
  if(dist.length>=2){
    [[1.00,0.18],[0.70,0.14],[0.40,0.10]].forEach(([pct,al])=>{
      ctx.beginPath();
      let started=false;
      dist.forEach(d=>{
        const xc=Math.max(XMIN,Math.min(XMAX,d.age));
        const yv=Math.max(YMIN,Math.min(YMAX,d.lo+(d.hi-d.lo)*pct));
        if(!started){ctx.moveTo(px(xc),py(yv));started=true;}else ctx.lineTo(px(xc),py(yv));
      });
      [...dist].reverse().forEach(d=>{
        const xc=Math.max(XMIN,Math.min(XMAX,d.age));
        const yv=Math.max(YMIN,Math.min(YMAX,d.lo));
        ctx.lineTo(px(xc),py(yv));
      });
      ctx.closePath();ctx.fillStyle=`rgba(90,150,100,${al})`;ctx.fill();
    });
  }

  // grid
  ctx.strokeStyle='rgba(0,0,0,0.06)';ctx.lineWidth=0.5;
  const yStep=YMAX<=60?10:YMAX<=120?20:50;
  for(let y=Math.ceil(YMIN/yStep)*yStep;y<=YMAX;y+=yStep){ctx.beginPath();ctx.moveTo(PAD.l,py(y));ctx.lineTo(PAD.l+PW,py(y));ctx.stroke();}
  const xStep=XMAX-XMIN<=20?2:5;
  for(let x=Math.ceil(XMIN/xStep)*xStep;x<=XMAX;x+=xStep){ctx.beginPath();ctx.moveTo(px(x),PAD.t);ctx.lineTo(px(x),PAD.t+PH);ctx.stroke();}

  // danger line
  if(100>=YMIN&&100<=YMAX){
    ctx.setLineDash([5,4]);ctx.strokeStyle='#D85A30';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(PAD.l,py(100));ctx.lineTo(PAD.l+PW,py(100));ctx.stroke();ctx.setLineDash([]);
    ctx.font=`${FS}px monospace`;ctx.fillStyle='#D85A30';ctx.textAlign='right';ctx.textBaseline='bottom';
    ctx.fillText('要注意(100)',PAD.l+PW-2,py(100)-2);
  }

  // frame
  ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=1;ctx.strokeRect(PAD.l,PAD.t,PW,PH);

  // axis labels
  ctx.font=`${FS}px monospace`;ctx.fillStyle='#666';
  ctx.textAlign='center';ctx.textBaseline='top';
  for(let x=Math.ceil(XMIN/xStep)*xStep;x<=XMAX;x+=xStep)ctx.fillText(x+'歳',px(x),PAD.t+PH+4);
  ctx.textAlign='right';ctx.textBaseline='middle';
  for(let y=Math.ceil(YMIN/yStep)*yStep;y<=YMAX;y+=yStep)ctx.fillText(y,PAD.l-3,py(y));

  // axis titles
  ctx.textBaseline='alphabetic';ctx.textAlign='center';
  ctx.fillText('年齢（歳）',PAD.l+PW/2,H-3);
  ctx.save();ctx.translate(13,PAD.t+PH/2);ctx.rotate(-Math.PI/2);ctx.fillText('内臓脂肪指数',0,0);ctx.restore();

  // plots
  const N=records.length;
  const pts=records.filter(r=>r.visceral!=null).map(r=>({x:px(Math.max(XMIN,Math.min(XMAX,calcAge(r.date)))),y:py(Math.max(YMIN,Math.min(YMAX,r.visceral)))}));
  const Np=pts.length;
  if(Np>0){
    drawConn(ctx,pts,Np);
    for(let i=0;i<Np-1;i++)drawDot(ctx,pts[i].x,pts[i].y,i/(Np-1));
    drawStar(ctx,pts[Np-1].x,pts[Np-1].y,11,'#FFD700');
  }
}

function drawBodyMap(){
  const cb=document.getElementById('cb');
  if(!cb)return;
  const W=cb.width,H=cb.height,ctx=cb.getContext('2d');
  const PAD={l:62,r:86,t:34,b:54},PW=W-PAD.l-PAD.r,PH=H-PAD.t-PAD.b;
  const {xMin:XMIN,xMax:XMAX,yMin:YMIN,yMax:YMAX}=mapState.body;
  const px=x=>PAD.l+(x-XMIN)/(XMAX-XMIN)*PW;
  const py=y=>PAD.t+(1-(y-YMIN)/(YMAX-YMIN))*PH;
  const cX=x=>Math.max(XMIN,Math.min(XMAX,x));
  const cY=y=>Math.max(YMIN,Math.min(YMAX,y));
  const FS=18; // uniform font size — same as zone labels

  ctx.clearRect(0,0,W,H);ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);

  const BH=25,BM=21.75,BL=18.5,al=0.40,BC='rgba(80,78,72,0.55)',OB=[228,185,152],OL=[88,45,5];
  const zones=[
    {x1:0,x2:15,y1:BH,y2:35,bg:[85,168,135],lc:[4,68,48],label:'アスリート'},
    {x1:15,x2:20,y1:BH,y2:35,bg:OB,lc:OL,label:'やや肥満'},
    {x1:20,x2:30,y1:BH,y2:35,bg:[215,155,130],lc:[100,40,5],label:'肥満'},
    {x1:5,x2:15,y1:BM,y2:BH,bg:[112,190,160],lc:[4,68,48],label:'筋肉型'},
    {x1:15,x2:20,y1:BL,y2:BH,bg:[165,220,188],lc:[4,68,48],label:'適正'},
    {x1:20,x2:30,y1:BM,y2:BH,bg:OB,lc:OL,label:'やや肥満'},
    {x1:0,x2:10,y1:BL,y2:BM,bg:[138,202,174],lc:[4,68,48],label:'筋肉型\nスリム'},
    {x1:10,x2:15,y1:BL,y2:BM,bg:[168,218,192],lc:[4,68,48],label:'スリム'},
    {x1:20,x2:25,y1:10,y2:BM,bg:[238,200,170],lc:[88,45,5],label:'隠れ肥満'},
    {x1:0,x2:10,y1:10,y2:BL,bg:[220,238,222],lc:[28,90,10],label:'痩せ'},
    {x1:10,x2:20,y1:10,y2:BL,bg:[205,228,208],lc:[28,90,10],label:'やや痩せ'},
  ];

  // fill zones
  zones.forEach(z=>{
    const x1c=cX(z.x1),x2c=cX(z.x2),y1c=cY(z.y1),y2c=cY(z.y2);
    if(x1c>=x2c||y1c>=y2c)return;
    ctx.fillStyle=`rgba(${z.bg[0]},${z.bg[1]},${z.bg[2]},${al})`;
    ctx.fillRect(px(x1c),py(y2c),px(x2c)-px(x1c),py(y1c)-py(y2c));
  });
  // stroke zones
  ctx.strokeStyle=BC;ctx.lineWidth=1;ctx.setLineDash([]);
  zones.forEach(z=>{
    const x1c=cX(z.x1),x2c=cX(z.x2),y1c=cY(z.y1),y2c=cY(z.y2);
    if(x1c>=x2c||y1c>=y2c)return;
    ctx.strokeRect(px(x1c),py(y2c),px(x2c)-px(x1c),py(y1c)-py(y2c));
  });
  // frame
  ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=1;ctx.strokeRect(PAD.l,PAD.t,PW,PH);

  // zone labels — bold FS px, same as all other text
  zones.forEach(z=>{
    const x1c=cX(z.x1),x2c=cX(z.x2),y1c=cY(z.y1),y2c=cY(z.y2);
    if(x1c>=x2c||y1c>=y2c)return;
    const cx2=(px(x1c)+px(x2c))/2,cy2=(py(y1c)+py(y2c))/2;
    const lines=z.label.split('\n');
    ctx.font=`bold ${FS}px sans-serif`;
    ctx.fillStyle=`rgba(${z.lc[0]},${z.lc[1]},${z.lc[2]},0.95)`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    lines.forEach((ln,li)=>ctx.fillText(ln,cx2,cy2+(li-(lines.length-1)/2)*(FS+2)));
  });

  // axis labels — same FS
  ctx.font=`${FS}px monospace`;ctx.fillStyle='#666';
  const xStep=XMAX-XMIN<=15?2:5;
  const yStep=YMAX-YMIN<=8?0.5:1;
  ctx.textAlign='center';ctx.textBaseline='top';
  for(let x=Math.ceil(XMIN/xStep)*xStep;x<=XMAX;x+=xStep)ctx.fillText(x+'%',px(x),PAD.t+PH+4);
  ctx.textAlign='right';ctx.textBaseline='middle';
  for(let y=Math.ceil(YMIN*(1/yStep))/(1/yStep);y<=YMAX+0.001;y+=yStep){
    const yy=Math.round(y*100)/100;
    if(yy<YMIN||yy>YMAX)continue;
    ctx.fillText(yy%1===0?String(yy):yy.toFixed(2===yStep?0:1),PAD.l-3,py(yy));
  }

  // right BMI callouts — same FS
  ctx.font=`${FS}px monospace`;ctx.fillStyle='#888';ctx.textAlign='left';ctx.textBaseline='middle';
  [[BH,'25.0'],[BM,'21.75'],[BL,'18.5']].forEach(([y,l])=>{if(y>=YMIN&&y<=YMAX)ctx.fillText(l,px(XMAX)+4,py(y));});

  // axis titles
  ctx.textBaseline='alphabetic';ctx.textAlign='center';
  ctx.fillText('体脂肪率 (%)',PAD.l+PW/2,H-4);
  ctx.save();ctx.translate(14,PAD.t+PH/2);ctx.rotate(-Math.PI/2);ctx.fillText('BMI (kg/m²)',0,0);ctx.restore();

  // plots
  const N=records.length;
  const pts=records.filter(r=>r.fatpct!=null&&r.bmi!=null).map(r=>({
    x:px(Math.max(XMIN,Math.min(XMAX,r.fatpct))),
    y:py(Math.max(YMIN,Math.min(YMAX,r.bmi)))
  }));
  const Np=pts.length;
  if(Np>0){
    drawConn(ctx,pts,Np);
    for(let i=0;i<Np-1;i++)drawDot(ctx,pts[i].x,pts[i].y,i/(Np-1));
    drawStar(ctx,pts[Np-1].x,pts[Np-1].y,11,'#FFD700');
  }
}
